name: CI Complete - Suno Clone AI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths:
      - 'agents/backend/onyx/server/features/suno_clone_ai/**'
      - '.github/workflows/ci-complete.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'agents/backend/onyx/server/features/suno_clone_ai/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      run_tests:
        description: 'Run full test suite'
        required: false
        default: true
        type: boolean
      run_security:
        description: 'Run security scans'
        required: false
        default: true
        type: boolean
      run_performance:
        description: 'Run performance tests'
        required: false
        default: false
        type: boolean

env:
  PROJECT_PATH: agents/backend/onyx/server/features/suno_clone_ai
  PYTHON_VERSION: '3.11'
  DOCKER_IMAGE_NAME: suno-clone-ai
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ============================================================================
  # Code Quality & Linting
  # ============================================================================
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.PROJECT_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install black flake8 mypy pylint isort bandit safety

      - name: Check code formatting with Black
        run: |
          black --check --diff .
        continue-on-error: true

      - name: Sort imports with isort
        run: |
          isort --check-only --diff .
        continue-on-error: true

      - name: Lint with flake8
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --max-line-length=127 \
            --extend-ignore=E203,W503
        continue-on-error: true

      - name: Lint with Pylint
        run: |
          pylint --rcfile=.pylintrc $(find . -name "*.py" -not -path "./tests/*" -not -path "./venv/*") || true
        continue-on-error: true

      - name: Type check with mypy
        run: |
          mypy . --ignore-missing-imports --no-strict-optional || true
        continue-on-error: true

      - name: Upload code quality results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-quality-results
          path: |
            ${{ env.PROJECT_PATH }}/.flake8
            ${{ env.PROJECT_PATH }}/.pylintrc
          retention-days: 7

  # ============================================================================
  # Security Scanning
  # ============================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ env.PROJECT_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit semgrep

      - name: Run Safety check (dependency vulnerabilities)
        run: |
          safety check --json --output safety-report.json || true
        continue-on-error: true

      - name: Run Bandit (security linter)
        run: |
          bandit -r . \
            -f json \
            -o bandit-report.json \
            --exclude ./tests,./venv \
            --severity-level medium || true
        continue-on-error: true

      - name: Run Semgrep (static analysis)
        run: |
          semgrep --config=auto \
            --json \
            --output=semgrep-report.json \
            . || true
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            ${{ env.PROJECT_PATH }}/safety-report.json
            ${{ env.PROJECT_PATH }}/bandit-report.json
            ${{ env.PROJECT_PATH }}/semgrep-report.json
          retention-days: 30

      - name: Comment PR with security findings
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔒 Security Scan Results\n\n';
            
            if (fs.existsSync('safety-report.json')) {
              const safety = JSON.parse(fs.readFileSync('safety-report.json', 'utf8'));
              if (safety.vulnerabilities && safety.vulnerabilities.length > 0) {
                comment += '### ⚠️ Dependency Vulnerabilities Found\n';
                safety.vulnerabilities.forEach(v => {
                  comment += `- ${v.package}: ${v.vulnerability_id}\n`;
                });
              }
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ============================================================================
  # Unit Tests
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        test-group: ['core', 'api', 'services', 'utils']
      fail-fast: false

    defaults:
      run:
        working-directory: ${{ env.PROJECT_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist pytest-asyncio pytest-mock

      - name: Run unit tests (${{ matrix.test-group }})
        run: |
          pytest tests/test_${{ matrix.test-group }}/ \
            -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --junit-xml=junit-${{ matrix.test-group }}-${{ matrix.python-version }}.xml \
            -n auto \
            --maxfail=5

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          flags: ${{ matrix.test-group }}
          name: ${{ matrix.test-group }}-${{ matrix.python-version }}
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.test-group }}-${{ matrix.python-version }}
          path: |
            ${{ env.PROJECT_PATH }}/coverage.xml
            ${{ env.PROJECT_PATH }}/htmlcov/
            ${{ env.PROJECT_PATH }}/junit-${{ matrix.test-group }}-${{ matrix.python-version }}.xml
          retention-days: 30

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [unit-tests]
    defaults:
      run:
        working-directory: ${{ env.PROJECT_PATH }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
        run: |
          pytest tests/test_integration/ \
            -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --junit-xml=junit-integration.xml \
            --maxfail=3

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            ${{ env.PROJECT_PATH }}/coverage.xml
            ${{ env.PROJECT_PATH }}/htmlcov/
            ${{ env.PROJECT_PATH }}/junit-integration.xml
          retention-days: 30

  # ============================================================================
  # Performance Tests
  # ============================================================================
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' && inputs.run_performance == true || github.ref == 'refs/heads/main'
    needs: [integration-tests]
    defaults:
      run:
        working-directory: ${{ env.PROJECT_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-benchmark locust

      - name: Run performance/load tests
        run: |
          pytest tests/test_load/ \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            -v || true

      - name: Run Locust load tests
        run: |
          locust -f tests/test_load/locustfile.py \
            --headless \
            --users 10 \
            --spawn-rate 2 \
            --run-time 60s \
            --html=locust-report.html || true

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results
          path: |
            ${{ env.PROJECT_PATH }}/benchmark-results.json
            ${{ env.PROJECT_PATH }}/locust-report.html
          retention-days: 90

  # ============================================================================
  # Docker Build & Test
  # ============================================================================
  docker-build:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [code-quality, security-scan]
    defaults:
      run:
        working-directory: ${{ env.PROJECT_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and test Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.PROJECT_PATH }}
          file: ${{ env.PROJECT_PATH }}/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Test Docker image
        run: |
          docker run --rm \
            -e API_HOST=0.0.0.0 \
            -e API_PORT=8020 \
            -e DEBUG=False \
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} \
            python -m pytest tests/ -v --tb=short || true

      - name: Save Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker save ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} | gzip > image.tar.gz

      - name: Upload Docker image
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ${{ env.PROJECT_PATH }}/image.tar.gz
          retention-days: 7

  # ============================================================================
  # Deploy to Staging
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [docker-build, integration-tests]
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment:
      name: staging
      url: http://${{ secrets.EC2_STAGING_HOST }}:8020

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v7
        with:
          name: docker-image
          path: ${{ env.PROJECT_PATH }}

      - name: Deploy to EC2 Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_STAGING_HOST }}
          username: ${{ secrets.EC2_STAGING_USER }}
          key: ${{ secrets.EC2_STAGING_SSH_KEY }}
          script: |
            cd ~/suno-clone-ai
            docker load < image.tar.gz
            docker stop suno-clone-ai-staging || true
            docker rm suno-clone-ai-staging || true
            docker run -d \
              --name suno-clone-ai-staging \
              --restart unless-stopped \
              -p 8020:8020 \
              --env-file .env \
              ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Health check
        run: |
          sleep 30
          curl -f http://${{ secrets.EC2_STAGING_HOST }}:8020/health || exit 1

  # ============================================================================
  # Deploy to Production
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [docker-build, integration-tests, performance-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: http://${{ secrets.EC2_HOST }}:8020

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v7
        with:
          name: docker-image
          path: ${{ env.PROJECT_PATH }}

      - name: Create backup before deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/suno-clone-ai
            if [ -f deploy/scripts/backup.sh ]; then
              ./deploy/scripts/backup.sh || true
            fi

      - name: Deploy to EC2 Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/suno-clone-ai
            docker load < image.tar.gz
            
            # Tag previous version for rollback
            docker tag suno-clone-ai:latest suno-clone-ai:previous || true
            
            # Stop and remove current container
            docker stop suno-clone-ai || true
            docker rm suno-clone-ai || true
            
            # Start new container
            docker run -d \
              --name suno-clone-ai \
              --restart unless-stopped \
              -p 8020:8020 \
              --env-file .env \
              --health-cmd="curl -f http://localhost:8020/health || exit 1" \
              --health-interval=30s \
              --health-timeout=10s \
              --health-retries=3 \
              ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Health check
        run: |
          for i in {1..10}; do
            if curl -f http://${{ secrets.EC2_HOST }}:8020/health; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Waiting for health check... ($i/10)"
            sleep 10
          done
          echo "❌ Health check failed"
          exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/suno-clone-ai
            docker stop suno-clone-ai || true
            docker rm suno-clone-ai || true
            docker run -d \
              --name suno-clone-ai \
              --restart unless-stopped \
              -p 8020:8020 \
              --env-file .env \
              suno-clone-ai:previous

  # ============================================================================
  # Notifications
  # ============================================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-production, deploy-staging]
    if: always()

    steps:
      - name: Notify Slack - Success
        if: success()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "✅ Suno Clone AI CI/CD Pipeline Completed Successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Pipeline Status:* ✅ Success\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Author:* ${{ github.actor }}\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "❌ Suno Clone AI CI/CD Pipeline Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Pipeline Status:* ❌ Failed\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Author:* ${{ github.actor }}\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}




