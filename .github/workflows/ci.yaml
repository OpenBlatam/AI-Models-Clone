name: ci
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r agents/backend/onyx/server/features/Frontier-Model-run/scripts/TruthGPT-main/optimization_core/requirements_advanced.txt
          pip install pytest pytest-cov ruff pip-audit
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest -q --maxfail=1 --disable-warnings
      - name: Security audit
        run: pip-audit -r agents/backend/onyx/server/features/Frontier-Model-run/scripts/TruthGPT-main/optimization_core/requirements_advanced.txt || true





