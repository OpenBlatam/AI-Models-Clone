name: Cleanup

on:
  schedule:
    # Run daily at 4 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  cleanup-runs:
    name: Cleanup Old Workflow Runs
    runs-on: ubuntu-latest
    permissions:
      write: all

    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain-days: 30
          keep-minimum-runs: 10

  cleanup-artifacts:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    permissions:
      write: all

    steps:
      - name: Delete old artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: '*'
          failOnError: false
          olderThanDays: 30
          minimumArtifactsToKeep: 5

  cleanup-docker-images:
    name: Cleanup Docker Images
    runs-on: ubuntu-latest
    if: github.repository_owner != ''

    steps:
      - name: Delete old Docker images
        uses: actions/github-script@v7
        with:
          script: |
            const { data: packages } = await github.rest.packages.listPackagesForOrganization({
              package_type: 'container',
              org: context.repo.owner,
              package_name: 'suno-clone-ai'
            });
            
            // Keep only last 10 versions
            if (packages.length > 10) {
              const sorted = packages.sort((a, b) => 
                new Date(b.updated_at) - new Date(a.updated_at)
              );
              
              for (const pkg of sorted.slice(10)) {
                try {
                  await github.rest.packages.deletePackageForOrg({
                    package_type: 'container',
                    package_name: 'suno-clone-ai',
                    org: context.repo.owner
                  });
                } catch (error) {
                  console.log(`Failed to delete ${pkg.name}: ${error.message}`);
                }
              }
            }




