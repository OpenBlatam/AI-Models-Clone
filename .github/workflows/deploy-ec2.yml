# GitHub Actions Workflow for Automatic Deployment to EC2
# Triggers on push to main branch

name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'agents/backend/onyx/server/features/ai_project_generator/**'
      - '.github/workflows/deploy-ec2.yml'
  workflow_dispatch: # Allow manual trigger

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: ai-project-generator
  ENVIRONMENT: production

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible boto3

      - name: Get EC2 instance IPs
        id: get-instances
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator/aws/terraform
          
          # Get instance IPs from Terraform output
          INSTANCE_IPS=$(terraform output -json ec2_instance_public_ips 2>/dev/null | jq -r '.[]' || echo "")
          
          if [ -z "$INSTANCE_IPS" ]; then
            # Try to get from Auto Scaling Group
            ASG_NAME=$(terraform output -raw autoscaling_group_name 2>/dev/null || echo "")
            if [ -n "$ASG_NAME" ]; then
              INSTANCE_IPS=$(aws autoscaling describe-auto-scaling-groups \
                --auto-scaling-group-names "$ASG_NAME" \
                --query 'AutoScalingGroups[0].Instances[*].PublicIpAddress' \
                --output text 2>/dev/null || echo "")
            fi
          fi
          
          if [ -z "$INSTANCE_IPS" ]; then
            echo "No instances found. Using fallback method."
            # Get instances by tag
            INSTANCE_IPS=$(aws ec2 describe-instances \
              --filters "Name=tag:Project,Values=${{ env.PROJECT_NAME }}" \
                        "Name=tag:Environment,Values=${{ env.ENVIRONMENT }}" \
                        "Name=instance-state-name,Values=running" \
              --query 'Reservations[*].Instances[*].PublicIpAddress' \
              --output text 2>/dev/null || echo "")
          fi
          
          echo "instances=$INSTANCE_IPS" >> $GITHUB_OUTPUT
          echo "Found instances: $INSTANCE_IPS"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ steps.get-instances.outputs.instances }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run Ansible deployment
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_SSH_PRIVATE_KEY_FILE: ~/.ssh/deploy_key
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator/aws/ansible
          
          # Create temporary inventory
          INSTANCE_IPS="${{ steps.get-instances.outputs.instances }}"
          if [ -n "$INSTANCE_IPS" ]; then
            for IP in $INSTANCE_IPS; do
              echo "[ec2_instances]" >> /tmp/inventory.ini
              echo "$IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/deploy_key" >> /tmp/inventory.ini
            done
            
            # Run deployment
            ansible-playbook -i /tmp/inventory.ini playbooks/update.yml \
              -e "project_name=${{ env.PROJECT_NAME }}" \
              -e "environment=${{ env.ENVIRONMENT }}" \
              -e "git_branch=main" \
              -e "git_commit=${{ github.sha }}"
          else
            echo "No instances found. Skipping deployment."
            exit 1
          fi

      - name: Health check
        run: |
          INSTANCE_IPS="${{ steps.get-instances.outputs.instances }}"
          if [ -n "$INSTANCE_IPS" ]; then
            for IP in $INSTANCE_IPS; do
              echo "Checking health of $IP..."
              for i in {1..5}; do
                if curl -f -s "http://$IP/health" > /dev/null 2>&1; then
                  echo "Health check passed for $IP"
                  break
                else
                  echo "Health check attempt $i failed, retrying..."
                  sleep 10
                fi
              done
            done
          fi

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi

