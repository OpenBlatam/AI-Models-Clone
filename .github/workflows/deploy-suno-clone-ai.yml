name: Deploy Suno Clone AI to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'agents/backend/onyx/server/features/suno_clone_ai/**'
      - '.github/workflows/deploy-suno-clone-ai.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PROJECT_PATH: agents/backend/onyx/server/features/suno_clone_ai
  DOCKER_IMAGE_NAME: suno-clone-ai
  DOCKER_CONTAINER_NAME: suno-clone-ai
  APP_PORT: 8020

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 mypy pytest pytest-cov

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Format check with black
        run: black --check .
        continue-on-error: true

      - name: Type check with mypy
        run: mypy . --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
          else
            echo "No tests directory found, skipping tests"
          fi
        continue-on-error: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  build-and-deploy:
    name: Build and Deploy to EC2
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: ${{ env.PROJECT_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub (optional)
        if: env.DOCKER_HUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.DOCKER_IMAGE_NAME }}:latest \
            --tag ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} \
            --file Dockerfile \
            .

      - name: Save Docker image as tar
        run: |
          docker save ${{ env.DOCKER_IMAGE_NAME }}:latest | gzip > ${{ env.DOCKER_IMAGE_NAME }}.tar.gz

      - name: Copy Docker image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "${{ env.PROJECT_PATH }}/${{ env.DOCKER_IMAGE_NAME }}.tar.gz"
          target: "~/suno-clone-ai/"
          strip_components: 1

      - name: Copy environment file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "${{ env.PROJECT_PATH }}/.env.example"
          target: "~/suno-clone-ai/.env"
          strip_components: 1
        continue-on-error: true

      - name: Copy deployment script to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "${{ env.PROJECT_PATH }}/deploy/deploy.sh"
          target: "~/suno-clone-ai/deploy.sh"
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/suno-clone-ai
            
            # Create directory if it doesn't exist
            mkdir -p ~/suno-clone-ai
            
            # Load Docker image
            echo "Loading Docker image..."
            docker load < ${{ env.DOCKER_IMAGE_NAME }}.tar.gz || true
            
            # Stop and remove existing container
            echo "Stopping existing container..."
            docker stop ${{ env.DOCKER_CONTAINER_NAME }} || true
            docker rm ${{ env.DOCKER_CONTAINER_NAME }} || true
            
            # Remove old images (keep last 2)
            echo "Cleaning up old images..."
            docker images ${{ env.DOCKER_IMAGE_NAME }} --format "{{.ID}}" | tail -n +3 | xargs -r docker rmi || true
            
            # Run health check script if exists
            if [ -f deploy.sh ]; then
              chmod +x deploy.sh
              ./deploy.sh
            else
              # Fallback deployment
              echo "Running fallback deployment..."
              docker run -d \
                --name ${{ env.DOCKER_CONTAINER_NAME }} \
                --restart unless-stopped \
                -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
                --env-file .env \
                --health-cmd="curl -f http://localhost:${{ env.APP_PORT }}/health || exit 1" \
                --health-interval=30s \
                --health-timeout=10s \
                --health-retries=3 \
                ${{ env.DOCKER_IMAGE_NAME }}:latest
            fi
            
            # Wait for application to be healthy
            echo "Waiting for application to be healthy..."
            sleep 30
            
            # Health check
            if docker ps | grep -q ${{ env.DOCKER_CONTAINER_NAME }}; then
              echo "✅ Container is running"
              if curl -f http://localhost:${{ env.APP_PORT }}/health; then
                echo "✅ Health check passed"
              else
                echo "❌ Health check failed"
                docker logs ${{ env.DOCKER_CONTAINER_NAME }} --tail 50
                exit 1
              fi
            else
              echo "❌ Container failed to start"
              docker logs ${{ env.DOCKER_CONTAINER_NAME }} --tail 50 || true
              exit 1
            fi

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Verifying deployment..."
            docker ps | grep ${{ env.DOCKER_CONTAINER_NAME }}
            docker logs ${{ env.DOCKER_CONTAINER_NAME }} --tail 20

      - name: Notify deployment success
        if: success()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          payload: |
            {
              "text": "✅ Suno Clone AI deployed successfully to EC2",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Suno Clone AI Deployment Successful* 🚀\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify deployment failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          payload: |
            {
              "text": "❌ Suno Clone AI deployment failed to EC2",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Suno Clone AI Deployment Failed* ❌\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*Workflow:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true




