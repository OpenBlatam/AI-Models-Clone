name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'agents/backend/onyx/server/features/3d_prototype_ai/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_tests:
        description: 'Skip tests'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: '3.11'

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install ansible ansible-lint
          if ! command -v terraform &> /dev/null; then
            wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
            sudo apt update && sudo apt install terraform -y
          fi
      
      - name: Validate Terraform
        working-directory: agents/backend/onyx/server/features/3d_prototype_ai/cloud
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate
          terraform fmt -check
      
      - name: Validate Ansible
        working-directory: agents/backend/onyx/server/features/3d_prototype_ai/cloud
        run: |
          ansible-playbook --syntax-check ansible/playbooks/deploy.yml
          ansible-lint ansible/playbooks/deploy.yml || true
      
      - name: Validate scripts
        working-directory: agents/backend/onyx/server/features/3d_prototype_ai/cloud
        run: |
          if command -v shellcheck &> /dev/null; then
            shellcheck scripts/*.sh scripts/lib/*.sh || true
          fi

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests || !github.event.inputs.skip_tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        working-directory: agents/backend/onyx/server/features/3d_prototype_ai
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run tests
        working-directory: agents/backend/onyx/server/features/3d_prototype_ai
        run: |
          pytest tests/ -v --cov=. --cov-report=xml || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [validate]
    if: ${{ !inputs.skip_tests || !github.event.inputs.skip_tests }} || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ inputs.environment || 'production' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup deployment tools
        run: |
          if ! command -v terraform &> /dev/null; then
            wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
            sudo apt update && sudo apt install terraform -y
          fi
      
      - name: Prepare deployment
        working-directory: agents/backend/onyx/server/features/3d_prototype_ai/cloud
        run: |
          mkdir -p .env
          echo "AWS_REGION=${{ env.AWS_REGION }}" >> .env
          echo "AWS_INSTANCE_TYPE=${{ secrets.AWS_INSTANCE_TYPE || 't3.large' }}" >> .env
          echo "AWS_KEY_NAME=${{ secrets.AWS_KEY_NAME }}" >> .env
          echo "DEPLOYMENT_METHOD=terraform" >> .env
      
      - name: Deploy infrastructure
        working-directory: agents/backend/onyx/server/features/3d_prototype_ai/cloud
        run: |
          chmod +x scripts/*.sh scripts/lib/*.sh
          ./scripts/deploy.sh --method terraform --skip-app
      
      - name: Deploy application
        working-directory: agents/backend/onyx/server/features/3d_prototype_ai/cloud
        run: |
          ./scripts/deploy.sh --method terraform
        env:
          AWS_KEY_PATH: ${{ secrets.AWS_SSH_KEY }}
      
      - name: Health check
        working-directory: agents/backend/onyx/server/features/3d_prototype_ai/cloud
        run: |
          INSTANCE_IP=$(cd terraform && terraform output -raw instance_public_ip)
          ./scripts/health_check.sh --ip $INSTANCE_IP || exit 1
      
      - name: Notify deployment status
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Deployment to ${{ inputs.environment || "production" }} ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

