---
# Production environment variables
# Inherits from all.yml and overrides for production

# Environment identifier
environment: production

# Instance configuration
instance_type: t3.large
min_instances: 1
max_instances: 3

# Security - stricter for production
ssh_allowed_cidr_blocks:
  - "0.0.0.0/0"  # TODO: Restrict to specific IPs

# Monitoring - more aggressive for production
monitoring_interval: 30
log_retention_days: 30
enable_alerts: true

# Backup - more frequent for production
backup_schedule: "0 2 * * *"  # Daily at 2 AM
backup_retention_days: 90

# Application settings
debug_mode: false
log_level: "INFO"

# High availability
enable_health_checks: true
health_check_interval: 10
health_check_timeout: 5
health_check_retries: 3

