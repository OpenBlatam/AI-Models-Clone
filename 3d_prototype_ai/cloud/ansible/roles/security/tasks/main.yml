---
# Security hardening role
# Implements security best practices for EC2 instances

- name: Update system packages
  apt:
    update_cache: yes
    upgrade: dist
    autoremove: yes
    autoclean: yes
  when: ansible_os_family == "Debian"

- name: Install security packages
  apt:
    name:
      - fail2ban
      - ufw
      - unattended-upgrades
      - apt-listchanges
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Configure automatic security updates
  template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: '0644'
  when: ansible_os_family == "Debian"

- name: Enable automatic updates
  template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: '0644'
  when: ansible_os_family == "Debian"

- name: Configure UFW firewall
  block:
    - name: Reset UFW to defaults
      ufw:
        state: reset
      when: ufw_enabled | default(true)
    
    - name: Set UFW default policies
      ufw:
        direction: "{{ item.direction }}"
        policy: "{{ item.policy }}"
      loop:
        - { direction: 'incoming', policy: 'deny' }
        - { direction: 'outgoing', policy: 'allow' }
      when: ufw_enabled | default(true)
    
    - name: Allow SSH
      ufw:
        rule: allow
        port: "{{ ssh_port }}"
        proto: tcp
      when: ufw_enabled | default(true)
    
    - name: Allow HTTP
      ufw:
        rule: allow
        port: "80"
        proto: tcp
      when: ufw_enabled | default(true)
    
    - name: Allow HTTPS
      ufw:
        rule: allow
        port: "443"
        proto: tcp
      when: ufw_enabled | default(true)
    
    - name: Allow application port
      ufw:
        rule: allow
        port: "{{ app_port }}"
        proto: tcp
      when: ufw_enabled | default(true)
    
    - name: Enable UFW
      ufw:
        state: enabled
      when: ufw_enabled | default(true)
  when: ufw_enabled | default(true)

- name: Configure Fail2Ban
  block:
    - name: Create Fail2Ban jail for SSH
      template:
        src: jail.local.j2
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: '0644'
      notify: restart fail2ban
    
    - name: Start and enable Fail2Ban
      systemd:
        name: fail2ban
        state: started
        enabled: yes
  when: fail2ban_enabled | default(true)

- name: Configure SSH hardening
  block:
    - name: Backup SSH config
      copy:
        src: /etc/ssh/sshd_config
        dest: /etc/ssh/sshd_config.backup
        remote_src: yes
      changed_when: false
    
    - name: Configure SSH settings
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        backup: yes
      loop:
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
        - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 3' }
        - { regexp: '^#?ClientAliveInterval', line: 'ClientAliveInterval 300' }
        - { regexp: '^#?ClientAliveCountMax', line: 'ClientAliveCountMax 2' }
      notify: restart sshd

- name: Set timezone
  timezone:
    name: "{{ timezone }}"
  when: timezone is defined

- name: Configure locale
  locale_gen:
    name: "{{ locale }}"
    state: present
  when: locale is defined and ansible_os_family == "Debian"

