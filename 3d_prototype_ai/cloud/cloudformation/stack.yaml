AWSTemplateFormatVersion: '2010-09-09'
Description: '3D Prototype AI - EC2 Deployment Stack'

Parameters:
  InstanceType:
    Type: String
    Default: t3.large
    Description: EC2 instance type
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3.2xlarge
  
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access
  
  AllowedCIDR:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR block allowed to access the application
  
  AppPort:
    Type: Number
    Default: 8030
    Description: Application port
  
  VolumeSize:
    Type: Number
    Default: 30
    Description: Root volume size in GB
    MinValue: 20
    MaxValue: 100

Resources:
  # Security Group
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for 3D Prototype AI
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
        - IpProtocol: tcp
          FromPort: !Ref AppPort
          ToPort: !Ref AppPort
          CidrIp: !Ref AllowedCIDR
          Description: Application Port
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: All outbound
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'
        - Key: Project
          Value: 3D-Prototype-AI
  
  # IAM Role
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ec2-role'
  
  # IAM Instance Profile
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role
  
  # EC2 Instance
  AppInstance:
    Type: AWS::EC2::Instance
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          default:
            - install
            - configure
        install:
          packages:
            apt:
              curl: []
              wget: []
              git: []
              python3: []
              python3-pip: []
              nginx: []
              docker.io: []
          files:
            /tmp/user-data-script.sh:
              source: !Sub |
                ${file(../user_data/init.sh)}
        configure:
          commands:
            configure:
              command: !Sub |
                bash /tmp/user-data-script.sh
    Properties:
      ImageId: !Sub |
        {{resolve:ssm:/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id}}
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          /opt/aws/bin/cfn-init -v \
            --stack ${AWS::StackName} \
            --resource AppInstance \
            --region ${AWS::Region}
          /opt/aws/bin/cfn-signal -e $? \
            --stack ${AWS::StackName} \
            --resource AppInstance \
            --region ${AWS::Region}
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: gp3
            Encrypted: true
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-instance'
        - Key: Project
          Value: 3D-Prototype-AI
  
  # Elastic IP (optional)
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref AppInstance
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-eip'

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref AppInstance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'
  
  PublicIP:
    Description: Public IP address
    Value: !Ref ElasticIP
    Export:
      Name: !Sub '${AWS::StackName}-PublicIP'
  
  PublicDNS:
    Description: Public DNS name
    Value: !GetAtt AppInstance.PublicDnsName
    Export:
      Name: !Sub '${AWS::StackName}-PublicDNS'
  
  ApplicationURL:
    Description: Application URL
    Value: !Sub 'http://${ElasticIP}:${AppPort}'
    Export:
      Name: !Sub '${AWS::StackName}-ApplicationURL'
  
  HealthCheckURL:
    Description: Health check URL
    Value: !Sub 'http://${ElasticIP}/health'
    Export:
      Name: !Sub '${AWS::StackName}-HealthCheckURL'
  
  SSHCommand:
    Description: SSH command to connect
    Value: !Sub 'ssh -i ${KeyName}.pem ubuntu@${ElasticIP}'
    Export:
      Name: !Sub '${AWS::StackName}-SSHCommand'

