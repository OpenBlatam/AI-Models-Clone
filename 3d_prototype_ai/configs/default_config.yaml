experiment_name: "default_3d_prototype"
seed: 42

model:
  name: "gpt2"
  type: "transformer"
  architecture:
    hidden_size: 768
    num_layers: 12
    num_heads: 12
  pretrained: true
  freeze_backbone: false

training:
  batch_size: 32
  num_epochs: 10
  learning_rate: 1e-4
  weight_decay: 1e-5
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_steps: 1000
  gradient_clip: 1.0
  mixed_precision: true
  gradient_accumulation_steps: 1

data:
  dataset_path: "./data"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  batch_size: 32
  num_workers: 4
  shuffle: true

use_wandb: true
use_tensorboard: true
output_dir: "./outputs"




