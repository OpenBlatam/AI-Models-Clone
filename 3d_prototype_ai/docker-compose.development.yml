version: '3.8'

# Development Docker Compose configuration
# Optimized for development with hot-reload and debugging

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.development
    container_name: 3d-prototype-ai-api-dev
    ports:
      - "8030:8030"
    environment:
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=8030
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: 3d-prototype-ai-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local

networks:
  app_network:
    driver: bridge
    name: 3d-prototype-ai-network-dev

