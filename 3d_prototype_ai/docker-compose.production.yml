version: '3.8'

# Production Docker Compose configuration
# Following DevOps best practices for security, scalability, and maintainability

services:
  # Main API service
  api:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VCS_REF: ${VCS_REF:-$(git rev-parse --short HEAD)}
        VERSION: ${VERSION:-latest}
    image: 3d-prototype-ai:${VERSION:-latest}
    container_name: 3d-prototype-ai-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8030}:8030"
    environment:
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8030
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://admin:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672//
      - CELERY_BROKER_URL=amqp://admin:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - app_storage:/app/storage
      - app_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis service
  redis:
    image: redis:7-alpine
    container_name: 3d-prototype-ai-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # RabbitMQ service
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: 3d-prototype-ai-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-admin}
      - RABBITMQ_DEFAULT_VHOST=/
    ports:
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Celery Worker
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: 3d-prototype-ai:${VERSION:-latest}
    container_name: 3d-prototype-ai-celery-worker
    command: celery -A utils.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    environment:
      - DEBUG=false
      - CELERY_BROKER_URL=amqp://admin:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
    volumes:
      - app_storage:/app/storage
      - app_logs:/app/logs
    depends_on:
      - redis
      - rabbitmq
      - api
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: 3d-prototype-ai:${VERSION:-latest}
    container_name: 3d-prototype-ai-celery-beat
    command: celery -A utils.celery_app beat --loglevel=info
    restart: unless-stopped
    environment:
      - DEBUG=false
      - CELERY_BROKER_URL=amqp://admin:${RABBITMQ_PASSWORD:-admin}@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - app_storage:/app/storage
      - app_logs:/app/logs
    depends_on:
      - redis
      - rabbitmq
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: 3d-prototype-ai-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: 3d-prototype-ai-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

# Named volumes for data persistence
volumes:
  app_storage:
    driver: local
  app_logs:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# Custom network for service isolation
networks:
  app_network:
    driver: bridge
    name: 3d-prototype-ai-network

