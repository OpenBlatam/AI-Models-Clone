# Pre-commit hooks para TruthGPT Test Suite
# Instalar con: pip install pre-commit && pre-commit install

repos:
  # Hooks generales de Python
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^tests/templates/
      - id: end-of-file-fixer
        exclude: ^tests/templates/
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: debug-statements
      - id: mixed-line-ending
      - id: requirements-txt-fixer

  # Formateo con black
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3
        args: ['--line-length=120']
        exclude: ^tests/templates/

  # Ordenamiento de imports
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=120']
        exclude: ^tests/templates/

  # Linting con flake8
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=120', '--ignore=E501,W503']
        exclude: ^tests/templates/

  # Validación de estructura
  - repo: local
    hooks:
      - id: validate-structure
        name: Validate Test Structure
        entry: python validate_structure.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]

  # Ejecutar tests rápidos antes de commit
  - repo: local
    hooks:
      - id: test-fast
        name: Run Fast Tests
        entry: make test-fast
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: false

