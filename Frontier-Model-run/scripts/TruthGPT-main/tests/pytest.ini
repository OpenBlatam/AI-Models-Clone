[pytest]
# Configuración de pytest para TruthGPT Test Suite

# Directorios donde buscar tests
testpaths = core

# Patrones de nombres de archivos de test
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Opciones por defecto
addopts = 
    -v
    --strict-markers
    --strict-config
    --tb=short
    --disable-warnings
    --color=yes

# Marcadores personalizados
markers =
    unit: Tests unitarios
    integration: Tests de integración
    slow: Tests que tardan mucho tiempo
    performance: Tests de rendimiento
    security: Tests de seguridad
    requires_cuda: Tests que requieren CUDA
    requires_gpu: Tests que requieren GPU
    analyzer: Tests de analizadores
    system: Tests de sistemas
    reporter: Tests de reportes
    exporter: Tests de exportadores

# Configuración de cobertura
[coverage:run]
source = ..
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

[coverage:html]
directory = htmlcov

# Configuración de logging
[log_cli]
enabled = false
level = INFO

[log_cli_verbose]
enabled = false
level = DEBUG

# Timeouts
timeout = 300
timeout_method = thread

