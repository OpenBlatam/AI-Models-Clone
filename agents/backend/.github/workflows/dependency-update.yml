name: Dependency Updates

on:
  schedule:
    # Run every Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of update to perform'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      files_to_update:
        description: 'Files to update (comma-separated)'
        required: false
        default: 'default.txt'
        type: string

jobs:
  dependency-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements/*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/default.txt
          pip install safety pip-tools
          
      - name: Check current vulnerabilities
        run: |
          echo "Checking for vulnerabilities in current dependencies..."
          safety check -r requirements/default.txt || {
            echo "Vulnerabilities found in current dependencies"
            exit 1
          }
          
      - name: Create backup
        run: |
          mkdir -p backups
          cp requirements/*.txt backups/
          echo "Backup created at $(date)"
          
      - name: Update dependencies
        run: |
          echo "Updating dependencies..."
          
          # Determine update type
          UPDATE_TYPE="${{ github.event.inputs.update_type || 'patch' }}"
          FILES_TO_UPDATE="${{ github.event.inputs.files_to_update || 'default.txt' }}"
          
          echo "Update type: $UPDATE_TYPE"
          echo "Files to update: $FILES_TO_UPDATE"
          
          # Update requirements files
          for file in ${FILES_TO_UPDATE//,/ }; do
            if [ -f "requirements/$file" ]; then
              echo "Updating requirements/$file..."
              
              # Create temporary file
              temp_file=$(mktemp)
              
              # Process each line
              while IFS= read -r line; do
                if [[ "$line" =~ ^[[:space:]]*# ]] || [[ -z "$line" ]]; then
                  # Comment or empty line, keep as is
                  echo "$line" >> "$temp_file"
                elif [[ "$line" =~ ^[[:space:]]*-r ]]; then
                  # Include directive, keep as is
                  echo "$line" >> "$temp_file"
                elif [[ "$line" =~ ^([^=]+)==([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
                  # Versioned requirement
                  package="${BASH_REMATCH[1]}"
                  major="${BASH_REMATCH[2]}"
                  minor="${BASH_REMATCH[3]}"
                  patch="${BASH_REMATCH[4]}"
                  
                  case "$UPDATE_TYPE" in
                    "patch")
                      new_version="$major.$minor.$((patch + 1))"
                      ;;
                    "minor")
                      new_version="$major.$((minor + 1)).0"
                      ;;
                    "major")
                      new_version="$((major + 1)).0.0"
                      ;;
                  esac
                  
                  echo "$package==$new_version" >> "$temp_file"
                  echo "Updated $package to $new_version"
                else
                  # Other format, keep as is
                  echo "$line" >> "$temp_file"
                fi
              done < "requirements/$file"
              
              # Replace original file
              mv "$temp_file" "requirements/$file"
              echo "Updated requirements/$file"
            else
              echo "Warning: requirements/$file not found"
            fi
          done
          
      - name: Install updated dependencies
        run: |
          echo "Installing updated dependencies..."
          pip install -r requirements/default.txt
          
      - name: Run tests
        run: |
          echo "Running tests..."
          pip install -r requirements/combined.txt
          python -m pytest tests/ -v --tb=short || {
            echo "Tests failed after dependency update"
            exit 1
          }
          
      - name: Check for new vulnerabilities
        run: |
          echo "Checking for vulnerabilities in updated dependencies..."
          safety check -r requirements/default.txt || {
            echo "Vulnerabilities found in updated dependencies"
            exit 1
          }
          
      - name: Generate dependency report
        run: |
          echo "Generating dependency analysis report..."
          python scripts/dependency_analyzer.py . --output "dependency_report_$(date +%Y%m%d).md" || {
            echo "Failed to generate dependency report"
          }
          
      - name: Create Pull Request
        if: github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update dependencies (${{ github.event.inputs.update_type || 'patch' }})"
          title: "🤖 Automated Dependency Update (${{ github.event.inputs.update_type || 'patch' }})"
          body: |
            ## Automated Dependency Update
            
            This PR was automatically generated to update dependencies.
            
            **Update Type:** ${{ github.event.inputs.update_type || 'patch' }}
            **Files Updated:** ${{ github.event.inputs.files_to_update || 'default.txt' }}
            
            ### Changes Made
            - Updated dependency versions
            - Ran security vulnerability checks
            - Executed test suite
            - Generated dependency analysis report
            
            ### Checklist
            - [x] Security vulnerabilities checked
            - [x] Tests passing
            - [x] Dependencies compatible
            - [ ] Manual review required
            
            ### Generated Report
            A dependency analysis report has been generated and attached to this PR.
            
            ---
            *This PR was automatically generated by GitHub Actions*
          branch: dependency-update-${{ github.event.inputs.update_type || 'patch' }}-${{ github.run_number }}
          delete-branch: true
          
      - name: Upload dependency report
        uses: actions/upload-artifact@v3
        with:
          name: dependency-report-${{ github.run_number }}
          path: dependency_report_*.md
          
      - name: Comment on PR
        if: github.event_name == 'schedule'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Find the generated report
            const reportFiles = fs.readdirSync('.').filter(file => 
              file.startsWith('dependency_report_') && file.endsWith('.md')
            );
            
            if (reportFiles.length > 0) {
              const reportPath = reportFiles[0];
              const reportContent = fs.readFileSync(reportPath, 'utf8');
              
              // Extract summary section
              const summaryMatch = reportContent.match(/## Summary([\s\S]*?)(?=##|$)/);
              const summary = summaryMatch ? summaryMatch[1].trim() : 'No summary available';
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Dependency Update Summary\n\n${summary}\n\n[View Full Report](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
            }
            
  security-scan:
    runs-on: ubuntu-latest
    needs: dependency-update
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install safety
        run: pip install safety
        
      - name: Run security scan
        run: |
          echo "Running comprehensive security scan..."
          safety check -r requirements/default.txt --json > security_report.json || {
            echo "Security vulnerabilities found"
            cat security_report.json
            exit 1
          }
          
      - name: Upload security report
        uses: actions/upload-artifact@v3
        with:
          name: security-report-${{ github.run_number }}
          path: security_report.json
          
  notify:
    runs-on: ubuntu-latest
    needs: [dependency-update, security-scan]
    if: always()
    
    steps:
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const { repo, owner } = context.repo;
            const runId = context.runId;
            
            console.log(`Dependency update failed for ${owner}/${repo}#${runId}`);
            
            // You can add notification logic here (Slack, email, etc.)
            // Example for Slack:
            /*
            const webhook = process.env.SLACK_WEBHOOK_URL;
            if (webhook) {
              await fetch(webhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  text: `❌ Dependency update failed for ${owner}/${repo}#${runId}`
                })
              });
            }
            */
            
      - name: Notify on success
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            const { repo, owner } = context.repo;
            const runId = context.runId;
            
            console.log(`Dependency update completed successfully for ${owner}/${repo}#${runId}`);
            
            // You can add success notification logic here 