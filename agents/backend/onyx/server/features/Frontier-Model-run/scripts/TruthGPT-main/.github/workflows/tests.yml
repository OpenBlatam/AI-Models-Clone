name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch numpy
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Run environment check
      run: python quick_check.py
    
    - name: Run tests
      run: python run_unified_tests.py --json test_results.json
    
    - name: Generate HTML report
      if: always()
      run: |
        python generate_html_report.py test_results.json test_report.html || echo "Report generation skipped"
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          test_results.json
          test_report.html
    
    - name: Upload HTML report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: html-report-${{ matrix.os }}-${{ matrix.python-version }}
        path: test_report.html
        if-no-files-found: ignore

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch numpy coverage
    
    - name: Run coverage
      run: python test_coverage.py run
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
