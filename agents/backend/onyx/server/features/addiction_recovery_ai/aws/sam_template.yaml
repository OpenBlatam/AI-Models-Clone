AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Addiction Recovery AI - Serverless API on AWS Lambda

Globals:
  Function:
    Timeout: 300
    MemorySize: 512
    Runtime: python3.11
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        AWS_REGION: !Ref AWS::Region
        DYNAMODB_TABLE_NAME: !Ref UsersTable
        S3_BUCKET_NAME: !Ref DataBucket
        CLOUDWATCH_LOG_GROUP: !Sub '/aws/lambda/${ServerlessFunction}'
        ENABLE_XRAY: 'true'
        PRELOAD_MODELS: 'true'

Resources:
  # Lambda Function
  ServerlessFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-addiction-recovery-ai'
      CodeUri: .
      Handler: aws.lambda_handler.lambda_handler
      Runtime: python3.11
      Timeout: 300
      MemorySize: 512
      ReservedConcurrentExecutions: 100
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          AWS_REGION: !Ref AWS::Region
          DYNAMODB_TABLE_NAME: !Ref UsersTable
          S3_BUCKET_NAME: !Ref DataBucket
          CLOUDWATCH_LOG_GROUP: !Sub '/aws/lambda/${ServerlessFunction}'
          CLOUDWATCH_METRICS_NAMESPACE: AddictionRecoveryAI
          ENABLE_XRAY: 'true'
          PRELOAD_MODELS: 'true'
          REDIS_ENDPOINT: !GetAtt ElastiCacheRedis.RedisEndpoint.Address
          SNS_TOPIC_ARN: !Ref NotificationTopic
          SQS_QUEUE_URL: !GetAtt BackgroundTasksQueue.QueueUrl
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
            RestApiId: !Ref ServerlessApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - S3ReadWritePolicy:
            BucketName: !Ref DataBucket
        - SNS PublishMessagePolicy:
            TopicName: !GetAtt NotificationTopic.TopicName
        - SQSSendMessagePolicy:
            QueueName: !GetAtt BackgroundTasksQueue.QueueName
        - CloudWatchLogsFullAccess: {}
        - XRayDaemonWriteAccess: {}
      Tracing: Active
      Layers:
        - !Ref LambdaLayer

  # API Gateway
  ServerlessApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub '${AWS::StackName}-api'
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'*'"
        AllowHeaders: "'*'"
        AllowOrigin: "'*'"
        MaxAge: "'600'"
      Auth:
        DefaultAuthorizer: AWS_IAM
      EndpointConfiguration:
        Type: REGIONAL
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true

  # DynamoDB Table
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-users'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # S3 Bucket for Data Storage
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-data-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 90
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: GLACIER
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Encryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ElastiCache Redis Cluster
  ElastiCacheRedis:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupId: !Sub '${AWS::StackName}-redis'
      Description: Redis cluster for caching
      Engine: redis
      CacheNodeType: cache.t3.micro
      NumCacheClusters: 2
      AutomaticFailoverEnabled: true
      MultiAZEnabled: true
      Port: 6379
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # SNS Topic for Notifications
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${AWS::StackName}-notifications'
      DisplayName: Addiction Recovery AI Notifications
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # SQS Queue for Background Tasks
  BackgroundTasksQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-background-tasks'
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600  # 14 days
      ReceiveMessageWaitTimeSeconds: 20  # Long polling
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # Lambda Layer for Dependencies
  LambdaLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub '${AWS::StackName}-dependencies'
      ContentUri: layer/
      CompatibleRuntimes:
        - python3.11
      RetentionPolicy: Retain

  # CloudWatch Alarm for Errors
  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-error-rate'
      AlarmDescription: Alert when error rate exceeds threshold
      MetricName: ErrorCount
      Namespace: AddictionRecoveryAI
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref NotificationTopic

  # CloudWatch Alarm for Latency
  LatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-high-latency'
      AlarmDescription: Alert when latency exceeds threshold
      MetricName: ResponseTime
      Namespace: AddictionRecoveryAI
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5000  # 5 seconds
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref NotificationTopic

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ServerlessApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-api-url'

  FunctionName:
    Description: Lambda function name
    Value: !Ref ServerlessFunction
    Export:
      Name: !Sub '${AWS::StackName}-function-name'

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref UsersTable
    Export:
      Name: !Sub '${AWS::StackName}-dynamodb-table'

  S3BucketName:
    Description: S3 bucket name
    Value: !Ref DataBucket
    Export:
      Name: !Sub '${AWS::StackName}-s3-bucket'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production
    Description: Deployment environment










