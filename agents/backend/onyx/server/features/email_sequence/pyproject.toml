    "sphinx.*",
    "sphinx_rtd_theme.*",
    "myst_parser.*",
    "ipywidgets.*",
    "gitpython.*",
    "docker.*",
    "kubernetes.*",
    "invoke.*",
    "fabric.*",
    "doit.*",
    "python_dateutil.*",
    "pytz.*",
    "fuzzywuzzy.*",
    "python_Levenshtein.*",
    "more_itertools.*",
    "toolz.*",
    "cupy_cuda11x.*",
    "cupy_cuda12x.*",
    "torch_distributed.*",
