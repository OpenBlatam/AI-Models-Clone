[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "email-sequence-ai"
version = "1.0.0"
description = "Advanced Email Sequence AI System with Optimization and Profiling"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Blatam Academy", email = "contact@blatamacademy.com"}
]
maintainers = [
    {name = "Blatam Academy", email = "contact@blatamacademy.com"}
]
keywords = [
    "email", "sequence", "ai", "machine-learning", "nlp", 
    "optimization", "profiling", "gradio", "pytorch", "transformers"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Communications :: Email",
    "Topic :: Text Processing :: Linguistic",
]
requires-python = ">=3.8"
dependencies = [
    "torch>=2.0.0",
    "transformers>=4.30.0",
    "datasets>=2.12.0",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scikit-learn>=1.3.0",
    "gradio>=3.35.0",
    "python-dotenv>=1.0.0",
    "pyyaml>=6.0",
    "loguru>=0.7.0",
    "tqdm>=4.65.0",
    "pydantic>=2.0.0",
    "pytest>=7.4.0",
    "better-exceptions>=0.3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.21.0",
    "pytest-mock>=3.11.0",
    "black>=23.7.0",
    "flake8>=6.0.0",
    "mypy>=1.5.0",
    "isort>=5.12.0",
    "sphinx>=7.1.0",
    "sphinx-rtd-theme>=1.3.0",
    "jupyter>=1.0.0",
    "jupyterlab>=4.0.0",
    "debugpy>=1.6.7",
    "icecream>=2.1.3",
    "memory-profiler>=0.61.0",
    "line-profiler>=4.1.0",
    "py-spy>=0.3.0",
    "pyinstrument>=4.6.0",
    "bandit>=1.7.5",
    "safety>=2.3.0",
    "pre-commit>=3.3.0",
    "coverage>=7.2.0",
    "pip-tools>=7.3.0",
    "tox>=4.6.0",
    "sentry-sdk>=1.28.0",
    "rich>=13.4.0",
    "click>=8.1.0",
    "watchdog>=3.0.0",
    "gitpython>=3.1.31",
    "docker>=6.1.0",
    "invoke>=2.0.0",
]

minimal = [
    "torch>=2.0.0",
    "transformers>=4.30.0",
    "datasets>=2.12.0",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scikit-learn>=1.3.0",
    "gradio>=3.35.0",
    "python-dotenv>=1.0.0",
    "pyyaml>=6.0",
    "loguru>=0.7.0",
    "tqdm>=4.65.0",
    "pydantic>=2.0.0",
    "pytest>=7.4.0",
    "better-exceptions>=0.3.0",
]

gpu = [
    "torch>=2.0.0+cu118",
    "torchvision>=0.15.0+cu118",
    "torchaudio>=2.0.0+cu118",
    "apex>=0.1.0",
]

distributed = [
    "torch>=2.0.0",
    "horovod>=0.28.0",
    "ray[tune]>=2.6.0",
]

cloud = [
    "boto3>=1.28.0",
    "s3fs>=2023.6.0",
    "google-cloud-storage>=2.10.0",
    "google-cloud-aiplatform>=1.35.0",
    "azure-storage-blob>=12.17.0",
    "azure-ai-ml>=1.8.0",
]

monitoring = [
    "prometheus-client>=0.17.0",
    "grafana-api>=1.0.3",
    "sentry-sdk>=1.28.0",
    "structlog>=23.1.0",
]

profiling = [
    "memory-profiler>=0.61.0",
    "line-profiler>=4.1.0",
    "py-spy>=0.3.0",
    "pyinstrument>=4.6.0",
    "cProfile-to-ps>=0.1.0",
    "snakeviz>=2.1.0",
]

optimization = [
    "optuna>=3.2.0",
    "hyperopt>=0.2.7",
    "ray[tune]>=2.6.0",
    "wandb>=0.15.0",
    "mlflow>=2.5.0",
    "tensorboard>=2.13.0",
]

nlp = [
    "nltk>=3.8.1",
    "spacy>=3.6.0",
    "textblob>=0.17.1",
    "gensim>=4.3.0",
    "wordcloud>=1.9.2",
    "jieba>=0.42.1",
]

web = [
    "flask>=2.3.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
    "streamlit>=1.25.0",
    "dash>=2.11.0",
]

database = [
    "sqlalchemy>=2.0.0",
    "alembic>=1.11.0",
    "redis>=4.6.0",
    "pymongo>=4.4.0",
    "elasticsearch>=8.8.0",
]

all = [
    "email-sequence-ai[dev,gpu,distributed,cloud,monitoring,profiling,optimization,nlp,web,database]",
]

[project.urls]
Homepage = "https://github.com/blatamacademy/email-sequence-ai"
Documentation = "https://email-sequence-ai.readthedocs.io/"
Repository = "https://github.com/blatamacademy/email-sequence-ai"
"Bug Tracker" = "https://github.com/blatamacademy/email-sequence-ai/issues"
"Source Code" = "https://github.com/blatamacademy/email-sequence-ai"

[project.scripts]
email-sequence-ai = "email_sequence.cli:main"
email-sequence-train = "email_sequence.training:main"
email-sequence-demo = "email_sequence.demo:main"
email-sequence-profile = "email_sequence.profiling:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["email_sequence*"]

[tool.setuptools.package-data]
"email_sequence" = [
    "configs/*.yaml",
    "configs/*.json",
    "models/*.pkl",
    "data/*.csv",
    "data/*.json",
]

[tool.black]
line-length = 88
target-version = ['py38', 'py39', 'py310', 'py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["email_sequence"]
known_third_party = ["torch", "transformers", "gradio", "numpy", "pandas"]

[tool.mypy]
python_version = "3.8"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "torch.*",
    "transformers.*",
    "gradio.*",
    "numpy.*",
    "pandas.*",
    "sklearn.*",
    "matplotlib.*",
    "seaborn.*",
    "plotly.*",
    "bokeh.*",
    "altair.*",
    "streamlit.*",
    "dash.*",
    "flask.*",
    "fastapi.*",
    "uvicorn.*",
    "sqlalchemy.*",
    "redis.*",
    "pymongo.*",
    "elasticsearch.*",
    "boto3.*",
    "google.*",
    "azure.*",
    "sentry_sdk.*",
    "prometheus_client.*",
    "grafana_api.*",
    "loguru.*",
    "structlog.*",
    "pytest.*",
    "coverage.*",
    "black.*",
    "flake8.*",
    "isort.*",
    "bandit.*",
    "safety.*",
    "pre_commit.*",
    "tox.*",
    "jupyter.*",
    "ipython.*",
    "notebook.*",
    "debugpy.*",
    "icecream.*",
    "memory_profiler.*",
    "line_profiler.*",
    "py_spy.*",
    "pyinstrument.*",
    "optuna.*",
    "hyperopt.*",
    "ray.*",
    "wandb.*",
    "mlflow.*",
    "tensorboard.*",
    "nltk.*",
    "spacy.*",
    "textblob.*",
    "gensim.*",
    "wordcloud.*",
    "jieba.*",
    "smtplib2.*",
    "email_validator.*",
    "mailchimp_marketing.*",
    "sendgrid.*",
    "requests.*",
    "httpx.*",
    "aiohttp.*",
    "websockets.*",
    "openai.*",
    "anthropic.*",
    "langchain.*",
    "pathlib2.*",
    "watchdog.*",
    "filelock.*",
    "rich.*",
    "click.*",
    "cryptography.*",
    "bcrypt.*",
    "passlib.*",
    "python_jose.*",
    "python_multipart.*",
    "shutil.*",
    "subprocess32.*",
    "psutil.*",
    "GPUtil.*",
    "nvidia_ml_py3.*",
    "pydantic.*",
    "marshmallow.*",
    "cerberus.*",
    "jsonschema.*",
    "diskcache.*",
    "joblib.*",
    "cachetools.*",
