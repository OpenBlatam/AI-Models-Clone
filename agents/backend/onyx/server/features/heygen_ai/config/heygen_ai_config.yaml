# HeyGen AI Configuration File
# =============================

# Model Configuration
model:
  name: "HeyGen AI Ultra Performance"
  version: "2.0.0"
  type: "multi_modal"
  
  # Transformer Model Settings
  transformer:
    model_size: "base"  # small, base, medium, large, xl
    vocab_size: 50257
    hidden_size: 768
    num_layers: 12
    num_attention_heads: 12
    intermediate_size: 3072
    max_position_embeddings: 1024
    dropout: 0.1
    activation_function: "gelu"  # gelu, relu, swish
    
    # LoRA Configuration
    enable_lora: false
    lora_rank: 16
    lora_alpha: 32
    lora_dropout: 0.1
  
  # Diffusion Model Settings
  diffusion:
    model_type: "stable_diffusion"  # stable_diffusion, sdxl, controlnet
    model_name: "runwayml/stable-diffusion-v1-5"
    torch_dtype: "fp16"  # fp16, bf16, fp32
    num_inference_steps: 50
    guidance_scale: 7.5
    height: 512
    width: 512

# Performance Configuration
performance:
  # Ultra Performance Settings
  enable_ultra_performance: true
  performance_mode: "maximum"  # maximum, balanced, memory-efficient
  
  # PyTorch Optimizations
  enable_torch_compile: true
  enable_flash_attention: true
  enable_memory_optimization: true
  enable_attention_slicing: false
  enable_vae_slicing: false
  enable_model_cpu_offload: false
  enable_xformers: true
  
  # Mixed Precision
  mixed_precision: true
  dtype: "fp16"  # fp16, bf16, fp32
  
  # Memory Management
  enable_gradient_checkpointing: false
  enable_dynamic_batching: true
  enable_performance_profiling: true

# Training Configuration
training:
  num_epochs: 10
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 1e-4
  weight_decay: 0.01
  warmup_steps: 1000
  max_grad_norm: 1.0
  
  # Optimizer Settings
  optimizer: "adamw"  # adamw, lion, sophia
  scheduler: "cosine"  # cosine, linear, cosine_with_restarts
  
  # Advanced Training
  enable_ultra_performance: true
  enable_torch_compile: true
  enable_flash_attention: true
  enable_memory_optimization: true
  enable_dynamic_batching: true
  enable_performance_profiling: true

# Data Configuration
data:
  data_dir: "data/"
  batch_size: 16
  num_workers: 4
  max_length: 512
  validation_split: 0.1
  test_split: 0.1
  
  # Data Processing
  enable_data_augmentation: true
  enable_caching: true
  cache_dir: "cache/"

# MLOps Configuration
mlops:
  enable_experiment_tracking: true
  enable_model_registry: true
  enable_monitoring: true
  enable_automated_ml: true
  
  # Experiment Tracking
  tracking_backend: "wandb"  # wandb, mlflow, tensorboard
  project_name: "heygen_ai"
  
  # Model Registry
  registry_backend: "local"  # local, mlflow, docker
  model_storage_path: "models/"

# Advanced Features
advanced:
  # Multi-Agent System
  enable_multi_agent: true
  num_agents: 5
  swarm_size: 10
  
  # Quantum Enhancement
  enable_quantum_enhancement: true
  hybrid_mode: true
  
  # Federated Learning
  enable_federated_learning: false
  num_clients: 3
  
  # Edge AI
  enable_edge_ai: false
  edge_devices: []

# Interface Configuration
interface:
  # Gradio Interface
  enable_gradio: true
  gradio_port: 7860
  gradio_share: false
  
  # API Interface
  enable_api: true
  api_port: 8000
  api_host: "0.0.0.0"
  
  # Web Interface
  enable_web: false
  web_port: 3000

# Security Configuration
security:
  enable_authentication: false
  enable_rate_limiting: true
  max_requests_per_minute: 100
  
  # API Keys
  require_api_key: false
  api_key_header: "X-API-Key"

# Monitoring Configuration
monitoring:
  enable_health_monitoring: true
  enable_performance_monitoring: true
  enable_error_tracking: true
  
  # Logging
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_file: "logs/heygen_ai.log"
  
  # Metrics
  enable_metrics_collection: true
  metrics_interval: 60  # seconds

# Hardware Configuration
hardware:
  # Device Selection
  device: "auto"  # auto, cuda, cpu, mps
  
  # GPU Settings
  gpu_memory_fraction: 0.9
  enable_multi_gpu: false
  gpu_ids: [0]
  
  # CPU Settings
  num_cpu_threads: "auto"
  enable_cpu_optimization: true

# Development Configuration
development:
  enable_debug_mode: false
  enable_profiling: false
  enable_testing: false
  
  # Testing
  test_data_dir: "tests/data/"
  test_models_dir: "tests/models/"
  
  # Development Tools
  enable_hot_reload: false
  enable_auto_restart: false

# Environment Configuration
environment:
  # Environment Variables
  env_file: ".env"
  
  # Paths
  base_path: "."
  models_path: "models/"
  data_path: "data/"
  logs_path: "logs/"
  cache_path: "cache/"
  
  # Temporary Files
  temp_path: "temp/"
  cleanup_temp_files: true
