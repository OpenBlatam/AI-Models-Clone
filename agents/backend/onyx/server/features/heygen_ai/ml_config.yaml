# Machine Learning Configuration for HeyGen AI
# This file contains all hyperparameters and settings for the ML module

# Model Configuration
model:
  name: "gpt2"
  max_length: 512
  d_model: 768
  n_heads: 12
  n_layers: 12
  vocab_size: 50257  # GPT-2 vocabulary size

# Training Configuration
training:
  batch_size: 16
  learning_rate: 5e-5
  num_epochs: 10
  warmup_steps: 100
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  weight_decay: 0.01
  fp16: true
  use_lora: false
  lora_rank: 16
  lora_alpha: 32.0

# Diffusion Model Configuration
diffusion:
  model_id: "runwayml/stable-diffusion-v1-5"
  xl_model_id: "stabilityai/stable-diffusion-xl-base-1.0"
  num_inference_steps: 20
  guidance_scale: 7.5
  use_safetensors: true
  enable_attention_slicing: true
  enable_vae_slicing: true
  enable_model_cpu_offload: true

# Data Configuration
data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  max_samples: 10000
  preprocessing:
    remove_duplicates: true
    min_length: 10
    max_length: 512

# Optimization Configuration
optimization:
  mixed_precision: true
  gradient_checkpointing: false
  use_amp: true
  memory_efficient_attention: true
  compile_model: false  # PyTorch 2.0+ feature

# Hardware Configuration
hardware:
  device: "auto"  # auto, cuda, cpu
  num_gpus: 1
  distributed_training: false
  pin_memory: true
  num_workers: 4

# Logging and Monitoring
logging:
  level: "INFO"
  save_checkpoints: true
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  tensorboard: true
  wandb: false
  wandb_project: "heygen-ai"
  wandb_entity: null

# Evaluation Configuration
evaluation:
  eval_steps: 500
  save_steps: 1000
  eval_accumulation_steps: 1
  prediction_loss_only: false
  per_device_eval_batch_size: 8

# Advanced Features
advanced:
  early_stopping: true
  early_stopping_patience: 3
  early_stopping_threshold: 0.001
  lr_scheduler: "cosine"  # linear, cosine, polynomial
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  dataloader_pin_memory: true
  dataloader_num_workers: 4

# Security and Validation
security:
  validate_inputs: true
  sanitize_prompts: true
  max_prompt_length: 1000
  block_harmful_content: true
  content_filter: true

# Performance Tuning
performance:
  use_cache: true
  cache_dir: ".cache"
  enable_profiling: false
  profile_memory: false
  optimize_for_inference: true
  jit_compile: false
