[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "heygen-ai-backend"
version = "1.0.0"
description = "AI-powered video generation system similar to HeyGen AI"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "HeyGen AI Team", email = "team@heygen.ai"}
]
maintainers = [
    {name = "HeyGen AI Team", email = "team@heygen.ai"}
]
keywords = ["ai", "video", "generation", "fastapi", "machine-learning"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Multimedia :: Video",
    "Framework :: FastAPI",
]
requires-python = ">=3.9"
dependencies = [
    # Core Framework
    "fastapi>=0.104.0,<0.105.0",
    "uvicorn[standard]>=0.24.0,<0.25.0",
    "gunicorn>=21.2.0,<22.0.0",
    "pydantic>=2.5.0,<3.0.0",
    "pydantic-settings>=2.1.0,<3.0.0",
    
    # Database
    "sqlalchemy>=2.0.23,<3.0.0",
    "alembic>=1.13.0,<2.0.0",
    "aiosqlite>=0.19.0,<0.20.0",
    "asyncpg>=0.29.0,<0.30.0",
    "redis>=5.0.1,<6.0.0",
    
    # Authentication
    "python-jose[cryptography]>=3.3.0,<4.0.0",
    "passlib[bcrypt]>=1.7.4,<2.0.0",
    "python-multipart>=0.0.6,<0.1.0",
    
    # HTTP and Networking
    "httpx>=0.25.0,<0.26.0",
    "requests>=2.31.0,<3.0.0",
    "aiohttp>=3.9.0,<4.0.0",
    
    # Background Tasks
    "celery>=5.3.4,<6.0.0",
    "asyncio-mqtt>=0.16.0,<0.17.0",
    
    # Monitoring and Logging
    "prometheus-client>=0.19.0,<0.20.0",
    "structlog>=23.2.0,<24.0.0",
    "sentry-sdk[fastapi]>=1.38.0,<2.0.0",
    
    # Rate Limiting and Caching
    "slowapi>=0.1.9,<0.2.0",
    "cachetools>=5.3.0,<6.0.0",
    "aioredis>=2.0.1,<3.0.0",
    
    # File Processing
    "aiofiles>=23.2.1,<24.0.0",
    "Pillow>=10.1.0,<11.0.0",
    "opencv-python>=4.8.1.78,<5.0.0",
    
    # Video and Audio
    "moviepy>=1.0.3,<2.0.0",
    "ffmpeg-python>=0.2.0,<0.3.0",
    "librosa>=0.10.1,<0.11.0",
    "soundfile>=0.12.1,<0.13.0",
    
    # AI/ML Core
    "torch>=2.1.0,<3.0.0",
    "transformers>=4.35.0,<5.0.0",
    "diffusers>=0.24.0,<0.25.0",
    "accelerate>=0.25.0,<0.26.0",
    
    # Vector Stores
    "faiss-cpu>=1.7.4,<2.0.0",
    "chromadb>=0.4.18,<0.5.0",
    "sentence-transformers>=2.2.2,<3.0.0",
    
    # LangChain
    "langchain>=0.1.0,<0.2.0",
    "langchain-openai>=0.1.0,<0.2.0",
    "openai>=1.3.0,<2.0.0",
    
    # Data Processing
    "numpy>=1.24.0,<2.0.0",
    "pandas>=2.1.0,<3.0.0",
    "scipy>=1.11.0,<2.0.0",
    
    # Configuration
    "python-dotenv>=1.0.0,<2.0.0",
    "click>=8.1.0,<9.0.0",
    "pyyaml>=6.0.1,<7.0.0",
    
    # Utilities
    "psutil>=5.9.6,<6.0.0",
    "tqdm>=4.66.0,<5.0.0",
    "python-dateutil>=2.8.2,<3.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.3,<8.0.0",
    "pytest-asyncio>=0.21.1,<0.22.0",
    "pytest-cov>=4.1.0,<5.0.0",
    "black>=23.11.0,<24.0.0",
    "flake8>=6.1.0,<7.0.0",
    "mypy>=1.7.1,<2.0.0",
    "isort>=5.12.0,<6.0.0",
    "pre-commit>=3.6.0,<4.0.0",
    "ipython>=8.17.0,<9.0.0",
    "rich>=13.7.0,<14.0.0",
    "typer>=0.9.0,<0.10.0",
]

test = [
    "pytest>=7.4.3,<8.0.0",
    "pytest-asyncio>=0.21.1,<0.22.0",
    "pytest-cov>=4.1.0,<5.0.0",
    "pytest-mock>=3.12.0,<4.0.0",
    "pytest-benchmark>=4.0.0,<5.0.0",
    "factory-boy>=3.3.0,<4.0.0",
    "faker>=20.1.0,<21.0.0",
    "responses>=0.24.1,<0.25.0",
    "testcontainers>=3.7.1,<4.0.0",
    "coverage>=7.3.2,<8.0.0",
]

docs = [
    "mkdocs>=1.5.3,<2.0.0",
    "mkdocs-material>=9.4.8,<10.0.0",
    "mkdocstrings[python]>=0.24.0,<0.25.0",
]

monitoring = [
    "prometheus-client>=0.19.0,<0.20.0",
    "structlog>=23.2.0,<24.0.0",
    "sentry-sdk[fastapi]>=1.38.0,<2.0.0",
    "jaeger-client>=4.8.0,<5.0.0",
    "opentelemetry-api>=1.21.0,<2.0.0",
    "opentelemetry-sdk>=1.21.0,<2.0.0",
]

ml = [
    "torch>=2.1.0,<3.0.0",
    "transformers>=4.35.0,<5.0.0",
    "diffusers>=0.24.0,<0.25.0",
    "accelerate>=0.25.0,<0.26.0",
    "safetensors>=0.4.0,<0.5.0",
    "xformers>=0.0.22,<0.1.0",
    "faiss-cpu>=1.7.4,<2.0.0",
    "chromadb>=0.4.18,<0.5.0",
    "sentence-transformers>=2.2.2,<3.0.0",
    "langchain>=0.1.0,<0.2.0",
    "langchain-openai>=0.1.0,<0.2.0",
    "openai>=1.3.0,<2.0.0",
    "wandb>=0.16.0,<0.17.0",
    "tensorboard>=2.15.0,<3.0.0",
    "mlflow>=2.8.0,<3.0.0",
]

video = [
    "moviepy>=1.0.3,<2.0.0",
    "ffmpeg-python>=0.2.0,<0.3.0",
    "opencv-python>=4.8.1.78,<5.0.0",
]

audio = [
    "librosa>=0.10.1,<0.11.0",
    "soundfile>=0.12.1,<0.13.0",
    "pydub>=0.25.1,<0.26.0",
]

all = [
    "heygen-ai-backend[dev,test,docs,monitoring,ml,video,audio]",
]

[project.urls]
Homepage = "https://github.com/heygen-ai/heygen-ai-backend"
Documentation = "https://heygen-ai-backend.readthedocs.io"
Repository = "https://github.com/heygen-ai/heygen-ai-backend.git"
"Bug Tracker" = "https://github.com/heygen-ai/heygen-ai-backend/issues"
"Changelog" = "https://github.com/heygen-ai/heygen-ai-backend/blob/main/CHANGELOG.md"

[project.scripts]
heygen-ai = "heygen_ai.main:main"
heygen-server = "heygen_ai.api.start_server:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["heygen_ai*"]
exclude = ["tests*", "docs*", "scripts*"]

[tool.setuptools.package-data]
"heygen_ai" = ["py.typed", "*.pyi"]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311', 'py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["heygen_ai"]
known_third_party = ["fastapi", "pydantic", "sqlalchemy", "torch", "transformers"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "torch.*",
    "transformers.*",
    "diffusers.*",
    "moviepy.*",
    "librosa.*",
    "opencv-python.*",
    "faiss.*",
    "chromadb.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers --strict-config"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "e2e: marks tests as end-to-end tests",
]

[tool.coverage.run]
source = ["heygen_ai"]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
    "*/migrations/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.bandit]
exclude_dirs = ["tests", "docs"]
skips = ["B101", "B601"]

[tool.ruff]
target-version = "py39"
line-length = 88
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501",  # line too long, handled by black
    "B008",  # do not perform function calls in argument defaults
    "C901",  # too complex
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**/*" = ["B011"] 