    "transformers>=4.36.0,<5.0.0",
    "accelerate>=0.25.0,<1.0.0",
    "numpy>=1.24.0,<2.0.0",
    "pandas>=2.1.0,<3.0.0",
    "scikit-learn>=1.3.0,<2.0.0",
    
    # Cybersecurity
