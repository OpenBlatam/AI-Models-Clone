    "matplotlib>=3.7.0,<4.0.0",
    "seaborn>=0.12.0,<1.0.0",
    "plotly>=5.17.0,<6.0.0",
    "scipy>=1.11.0,<2.0.0",
    "tensorboard>=2.15.0,<3.0.0",
    "wandb>=0.16.0,<1.0.0",
    "mlflow>=2.8.0,<3.0.0",
    "tqdm>=4.66.0,<5.0.0",
