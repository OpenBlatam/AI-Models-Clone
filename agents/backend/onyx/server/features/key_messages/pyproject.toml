    "netmiko>=4.3.0,<5.0.0",
    "selenium>=4.15.0,<5.0.0",
    "webdriver-manager>=4.0.0,<5.0.0",
    "requests-html>=0.10.0,<1.0.0",
    "mechanicalsoup>=1.3.0,<2.0.0",
    "pywebview>=4.4.0,<5.0.0",
    "pycryptodomex>=3.19.0,<4.0.0",
    "hashlib2>=1.0.0,<2.0.0",
