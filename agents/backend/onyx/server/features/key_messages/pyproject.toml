[project.urls]
Homepage = "https://github.com/blatam-academy/key-messages"
Documentation = "https://key-messages.readthedocs.io"
Repository = "https://github.com/blatam-academy/key-messages.git"
"Bug Tracker" = "https://github.com/blatam-academy/key-messages/issues"
"Security Policy" = "https://github.com/blatam-academy/key-messages/security/policy"

[project.scripts]
key-messages = "key_messages.cli:main"
key-messages-api = "key_messages.api:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["key_messages*"]
exclude = ["tests*", "docs*", "examples*"]

[tool.setuptools.package-data]
"key_messages" = ["py.typed", "*.pyi", "*.txt", "*.md", "*.yaml", "*.yml"]

[tool.setuptools_scm]
write_to = "key_messages/_version.py"
fallback_version = "2.0.0"

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311', 'py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["key_messages"]
known_third_party = ["fastapi", "pydantic", "torch", "transformers"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "torch.*",
    "transformers.*",
    "numpy.*",
    "pandas.*",
    "scipy.*",
    "sklearn.*",
    "matplotlib.*",
    "seaborn.*",
    "plotly.*",
    "cryptography.*",
    "paramiko.*",
    "selenium.*",
    "beautifulsoup4.*",
    "lxml.*",
    "redis.*",
    "aioredis.*",
    "sqlalchemy.*",
    "alembic.*",
    "asyncpg.*",
    "structlog.*",
    "prometheus_client.*",
    "slowapi.*",
    "tensorboard.*",
    "wandb.*",
    "mlflow.*",
    "pytest.*",
    "responses.*",
    "aioresponses.*",
    "freezegun.*",
    "factory_boy.*",
    "faker.*",
    "hypothesis.*",
    "coverage.*",
    "coveralls.*",
    "testcontainers.*",
    "scapy.*",
    "pypcap.*",
    "netmiko.*",
    "webdriver_manager.*",
    "requests_html.*",
    "mechanicalsoup.*",
    "pywebview.*",
    "pycryptodome.*",
    "pycryptodomex.*",
    "impacket.*",
    "ldap3.*",
    "volatility3.*",
    "yara.*",
    "pefile.*",
    "capstone.*",
    "keystone.*",
    "dpkt.*",
    "elasticsearch.*",
    "kibana.*",
    "misp.*",
    "stix2.*",
    "taxii2_client.*",
    "reportlab.*",
    "weasyprint.*",
    "jinja2.*",
    "colorama.*",
    "progressbar2.*",
    "gradio.*",
    "diffusers.*",
    "accelerate.*",
    "tqdm.*",
    "rich.*",
    "click.*",
    "passlib.*",
    "bcrypt.*",
    "argon2_cffi.*",
    "python_jose.*",
    "psutil.*",
    "email_validator.*",
    "PyJWT.*",
    "python_dotenv.*",
    "PyYAML.*",
    "python_multipart.*",
    "python_json_logger.*",
    "httpx.*",
    "aiohttp.*",
    "requests.*",
    "uvicorn.*",
    "pydantic.*",
    "pydantic_settings.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers --strict-config"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "cyber: marks tests as cybersecurity tests",
    "ml: marks tests as machine learning tests",
    "api: marks tests as API tests",
    "database: marks tests as database tests",
    "redis: marks tests as redis tests",
    "network: marks tests as network tests",
    "security: marks tests as security tests",
    "performance: marks tests as performance tests",
    "smoke: marks tests as smoke tests",
    "regression: marks tests as regression tests",
]

[tool.coverage.run]
source = ["key_messages"]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
    "*/venv/*",
    "*/env/*",
    "*/\.venv/*",
    "*/\.env/*",
    "*/migrations/*",
    "*/alembic/*",
    "*/docs/*",
    "*/examples/*",
    "*/scripts/*",
    "*/setup.py",
    "*/conftest.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.bandit]
exclude_dirs = ["tests", "docs", "examples", "scripts"]
skips = ["B101", "B601"]

[tool.safety]
policy = "strict" 