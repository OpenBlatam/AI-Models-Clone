# Docker Compose Ultra Optimizado - LinkedIn Posts Production
# ==========================================================

version: '3.8'

services:
  # API Principal - Ultra Optimizada
  linkedin-posts-api:
    build: .
    container_name: linkedin-posts-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@db/linkedin_posts
      - REDIS_URL=redis://redis:6379/0
      - WORKER_PROCESSES=4
      - WORKER_THREADS=50
      - LOG_LEVEL=INFO
      - ENABLE_PROFILING=true
      - ENABLE_METRICS=true
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
      - ./cache:/app/cache
    restart: unless-stopped
    networks:
      - linkedin-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  # Base de Datos PostgreSQL - Optimizada
  db:
    image: postgres:15-alpine
    container_name: linkedin-posts-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: linkedin_posts
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - linkedin-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # Redis Cache - Ultra Optimizado
  redis:
    image: redis:7-alpine
    container_name: linkedin-posts-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - linkedin-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Nginx - Load Balancer y Proxy
  nginx:
    image: nginx:alpine
    container_name: linkedin-posts-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - linkedin-posts-api
    restart: unless-stopped
    networks:
      - linkedin-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # Prometheus - Monitoreo
  prometheus:
    image: prom/prometheus:latest
    container_name: linkedin-posts-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - linkedin-network

  # Grafana - Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: linkedin-posts-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    restart: unless-stopped
    networks:
      - linkedin-network

  # Elasticsearch - Logs
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: linkedin-posts-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    restart: unless-stopped
    networks:
      - linkedin-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # Kibana - Visualización de Logs
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: linkedin-posts-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    restart: unless-stopped
    networks:
      - linkedin-network

  # Filebeat - Log Collection
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: linkedin-posts-filebeat
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/var/log/linkedin-posts:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - elasticsearch
    restart: unless-stopped
    networks:
      - linkedin-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  linkedin-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16 