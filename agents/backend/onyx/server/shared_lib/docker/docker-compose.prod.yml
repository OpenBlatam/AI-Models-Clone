version: '3.8'

# Docker Compose para Producción
# ================================
# Uso: docker-compose -f docker-compose.prod.yml up -d

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: shared-lib-api-prod
    ports:
      - "8030:8030"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://admin:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    depends_on:
      - redis
      - rabbitmq
    networks:
      - shared-lib-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: shared-lib-redis-prod
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - shared-lib-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: shared-lib-rabbitmq-prod
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - shared-lib-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: shared-lib-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../config/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - shared-lib-network
    restart: always

volumes:
  redis_data:
  rabbitmq_data:
  nginx_logs:

networks:
  shared-lib-network:
    driver: bridge




