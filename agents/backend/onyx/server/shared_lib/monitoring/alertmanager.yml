global:
  resolve_timeout: 5m

route:
  receiver: slack
  group_by: ['alertname', 'namespace']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - match:
        severity: critical
      receiver: pagerduty
    - match:
        severity: warning
      receiver: slack

receivers:
  - name: slack
    slack_configs:
      - api_url: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
        channel: "#music-analyzer-alerts"
        title: "{{ .CommonLabels.alertname }} - {{ .CommonLabels.severity }}"
        text: >-
          *Description:* {{ .CommonAnnotations.description }}
          *Details:* {{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}

  - name: pagerduty
    pagerduty_configs:
      - routing_key: YOUR_PAGERDUTY_KEY
        severity: "{{ .CommonLabels.severity }}"




