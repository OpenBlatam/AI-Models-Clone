name: MCP CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'agents/backend/onyx/server/features/ai_project_generator/mcp_server/**'
      - 'agents/backend/onyx/server/features/ai_project_generator/tests/**'
      - 'agents/backend/onyx/server/features/ai_project_generator/.github/workflows/mcp-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'agents/backend/onyx/server/features/ai_project_generator/mcp_server/**'
      - 'agents/backend/onyx/server/features/ai_project_generator/tests/**'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator
          pip install --upgrade pip
          pip install black ruff pylint
      
      - name: Run Black
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator
          black --check mcp_server/ tests/test_mcp*.py
      
      - name: Run Ruff
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator
          ruff check mcp_server/ tests/test_mcp*.py
      
      - name: Run Pylint
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator
          pylint mcp_server/ --disable=C,R --max-line-length=120 || true

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator
          pip install --upgrade pip
          pip install mypy types-PyYAML types-requests
          pip install -r requirements.txt
      
      - name: Run MyPy
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator
          mypy mcp_server/ --ignore-missing-imports --no-strict-optional || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock
      
      - name: Run unit tests
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator
          pytest tests/test_mcp_server.py -v --cov=mcp_server --cov-report=xml
      
      - name: Run E2E tests
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator
          pytest tests/test_mcp_e2e.py -v
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./agents/backend/onyx/server/features/ai_project_generator/coverage.xml
          flags: mcp

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Bandit
        run: pip install bandit[toml]
      
      - name: Run Bandit
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator
          bandit -r mcp_server/ -f json -o bandit-report.json || true
      
      - name: Upload Bandit report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: bandit-report
          path: agents/backend/onyx/server/features/ai_project_generator/bandit-report.json

  validate-manifests:
    name: Validate MCP Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator
          pip install --upgrade pip
          pip install pydantic pyyaml
      
      - name: Validate manifests
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator
          python -c "
          from mcp_server.manifests import ManifestLoader, ManifestRegistry
          import os
          registry = ManifestRegistry()
          if os.path.exists('mcp_server/manifests'):
              ManifestLoader.register_from_directory(registry, 'mcp_server/manifests')
              print(f'Validated {len(registry.get_all())} manifests')
          else:
              print('No manifests directory found, skipping validation')
          "

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator
          docker build -t ai-project-generator-mcp:latest .
      
      - name: Test Docker image
        run: |
          cd agents/backend/onyx/server/features/ai_project_generator
          docker run --rm ai-project-generator-mcp:latest python -c "from mcp_server import MCPServer; print('MCP Server imported successfully')"

