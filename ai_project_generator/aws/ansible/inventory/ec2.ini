[ec2]
# Use AWS EC2 dynamic inventory
plugin = aws_ec2

# Regions to search
regions:
  - us-east-1

# Filters
filters:
  tag:Project: ai-project-generator
  instance-state-name: running

# Group by tags
keyed_groups:
  - key: tags.Environment
    prefix: env
  - key: tags.Project
    prefix: project

# Host variables
hostnames:
  - ip-address
  - private-ip-address
  - dns-name

# Connection settings
ansible_user = ubuntu
ansible_ssh_private_key_file = ~/.ssh/ai-project-generator-key.pem

[app_servers:children]
project_ai-project-generator

