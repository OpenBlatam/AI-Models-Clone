---
# Ansible Playbook for Webhook-based Deployment
# This playbook is triggered by the GitHub webhook script

- name: Webhook-based Deployment
  hosts: localhost
  connection: local
  become: yes
  gather_facts: yes

  vars:
    project_name: "{{ project_name | default('ai-project-generator') }}"
    environment: "{{ environment | default('production') }}"
    git_branch: "{{ git_branch | default('main') }}"
    git_commit: "{{ git_commit | default('latest') }}"
    app_dir: "/opt/{{ project_name }}"
    app_user: "{{ app_user | default('ubuntu') }}"

  tasks:
    - name: Ensure deployment directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Check if git repository exists
      stat:
        path: "{{ app_dir }}/.git"
      register: git_repo

    - name: Clone repository if not exists
      git:
        repo: "{{ git_repo_url | default('https://github.com/your-org/your-repo.git') }}"
        dest: "{{ app_dir }}"
        version: "{{ git_branch }}"
        force: yes
      when: not git_repo.stat.exists
      become_user: "{{ app_user }}"

    - name: Update repository
      git:
        repo: "{{ git_repo_url | default('https://github.com/your-org/your-repo.git') }}"
        dest: "{{ app_dir }}"
        version: "{{ git_branch }}"
        force: yes
        update: yes
      when: git_repo.stat.exists
      become_user: "{{ app_user }}"

    - name: Get current commit hash
      command: git rev-parse HEAD
      args:
        chdir: "{{ app_dir }}"
      register: current_commit
      changed_when: false
      become_user: "{{ app_user }}"

    - name: Display deployment information
      debug:
        msg:
          - "Deploying commit: {{ current_commit.stdout }}"
          - "Branch: {{ git_branch }}"
          - "Environment: {{ environment }}"

    - name: Install Python dependencies
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"
        virtualenv_command: python3 -m venv
      become_user: "{{ app_user }}"
      when: ansible_facts['os_family'] == "Debian"

    - name: Restart application service
      systemd:
        name: "{{ project_name }}"
        state: restarted
        enabled: yes
      when: ansible_facts['systemd_status']['status'] is defined

    - name: Wait for application to be ready
      uri:
        url: "http://localhost:8020/health"
        method: GET
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 10
      delay: 5
      ignore_errors: yes

    - name: Verify deployment
      uri:
        url: "http://localhost:8020/health"
        method: GET
        status_code: 200
      register: final_health_check

    - name: Deployment status
      debug:
        msg:
          - "Deployment completed"
          - "Commit: {{ current_commit.stdout }}"
          - "Health check: {{ 'PASSED' if final_health_check.status == 200 else 'FAILED' }}"

