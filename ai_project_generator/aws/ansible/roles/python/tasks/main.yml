---
- name: Check Python version
  command: python3.11 --version
  register: python_version_check
  changed_when: false
  failed_when: false

- name: Install Python 3.11 if not present
  apt:
    name:
      - python3.11
      - python3.11-dev
      - python3.11-venv
    state: present
    update_cache: yes
  when: python_version_check.rc != 0 and ansible_os_family == "Debian"

- name: Install Python dependencies
  apt:
    name:
      - python3-pip
      - libpq-dev
      - libssl-dev
      - libffi-dev
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Upgrade pip
  pip:
    name: pip
    state: latest
    executable: pip3

- name: Install Python build dependencies
  pip:
    name:
      - setuptools
      - wheel
      - virtualenv
    state: latest
    executable: pip3

- name: Create Python virtual environment with Python 3.11
  command: python3.11 -m venv /opt/venv
  args:
    creates: /opt/venv/bin/python
  changed_when: true

- name: Upgrade pip in virtual environment
  pip:
    name: pip
    state: latest
    executable: /opt/venv/bin/pip

- name: Display Python information
  debug:
    msg:
      - "Python version: {{ python_version_check.stdout }}"
      - "Python virtual environment: /opt/venv"
      - "Virtual environment Python: {{ lookup('pipe', '/opt/venv/bin/python --version') }}"

