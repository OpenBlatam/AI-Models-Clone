version: '3.8'

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-project-generator-mcp
    ports:
      - "8020:8020"
    environment:
      - MCP_SECRET_KEY=${MCP_SECRET_KEY:-change-me-in-production}
      - MCP_ENABLE_TRACING=${MCP_ENABLE_TRACING:-true}
      - MCP_ENABLE_METRICS=${MCP_ENABLE_METRICS:-true}
      - OTLP_ENDPOINT=${OTLP_ENDPOINT:-}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    volumes:
      - ./mcp_server/manifests:/app/mcp_server/manifests:ro
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - mcp-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mcp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - mcp-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Mock MCP server para desarrollo/testing
  mcp-mock:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-mock-server
    ports:
      - "8021:8020"
    environment:
      - MCP_MOCK_MODE=true
      - MCP_SECRET_KEY=test-secret-key
    volumes:
      - ./mcp_server/mocks:/app/mcp_server/mocks:ro
      - ./tests:/app/tests:ro
    networks:
      - mcp-network
    profiles:
      - dev
    command: python -m pytest tests/ -v

  # Prometheus para métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: mcp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - mcp-network
    profiles:
      - monitoring
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana para dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: mcp-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - mcp-network
    profiles:
      - monitoring
    depends_on:
      - prometheus

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  mcp-network:
    driver: bridge

