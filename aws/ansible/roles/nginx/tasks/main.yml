---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Create Nginx configuration directory
  file:
    path: /etc/nginx/sites-available
    state: directory

- name: Configure Nginx reverse proxy
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/{{ project_name | default('blatam-academy') }}
    owner: root
    group: root
    mode: '0644'
  notify: restart nginx

- name: Enable Nginx site
  file:
    src: /etc/nginx/sites-available/{{ project_name | default('blatam-academy') }}
    dest: /etc/nginx/sites-enabled/{{ project_name | default('blatam-academy') }}
    state: link

- name: Test Nginx configuration
  command: nginx -t
  register: nginx_test
  changed_when: false
  failed_when: nginx_test.rc != 0

- name: Start and enable Nginx
  systemd:
    name: nginx
    state: started
    enabled: yes

- name: Display Nginx status
  debug:
    msg: "Nginx is configured and running"

