version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: aws/Dockerfile
    container_name: blatam-academy-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - app-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.blatam-academy.service=app"
      - "com.blatam-academy.environment=${ENVIRONMENT:-production}"

  redis:
    image: redis:7-alpine
    container_name: blatam-academy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.blatam-academy.service=redis"

  nginx:
    image: nginx:alpine
    container_name: blatam-academy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - app-network
    depends_on:
      - app
    labels:
      - "com.blatam-academy.service=nginx"

volumes:
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge



