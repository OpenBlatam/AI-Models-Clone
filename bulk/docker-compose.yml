version: '3.8'

services:
  bul-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bul-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bul-network

  # Prometheus (opcional)
  prometheus:
    image: prom/prometheus:latest
    container_name: bul-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - bul-network
    profiles:
      - monitoring
    restart: unless-stopped

  # Grafana (opcional)
  grafana:
    image: grafana/grafana:latest
    container_name: bul-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - bul-network
    profiles:
      - monitoring
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  bul-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
































