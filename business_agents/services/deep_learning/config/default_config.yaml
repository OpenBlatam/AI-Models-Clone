# Default Configuration for Deep Learning Service
# ===============================================

# Model Configuration
model:
  name: "custom_model"
  model_type: "transformer"  # transformer, cnn, lstm, diffusion
  architecture:
    vocab_size: 30000
    d_model: 512
    nhead: 8
    num_layers: 6
    dim_feedforward: 2048
    dropout: 0.1
    num_classes: 2
  initialization: "xavier_uniform"  # xavier_uniform, kaiming_uniform, etc.
  device: "auto"  # auto, cuda, cpu
  torch_dtype: "auto"  # auto, float16, bfloat16, float32

# Data Configuration
data:
  batch_size: 32
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  shuffle: true
  validation_split: 0.2
  test_split: 0.1
  seed: 42

# Training Configuration
training:
  epochs: 10
  learning_rate: 0.001
  weight_decay: 0.01
  optimizer: "adamw"  # adamw, adam, sgd, rmsprop
  optimizer_params:
    betas: [0.9, 0.999]
    eps: 1e-8
  
  # Mixed Precision
  use_mixed_precision: true
  mixed_precision_dtype: "float16"  # float16, bfloat16
  
  # Gradient Handling
  gradient_clip_norm: 1.0
  gradient_accumulation_steps: 1
  
  # Learning Rate Scheduling
  learning_rate_scheduler: "cosine"  # cosine, step, reduce_on_plateau, exponential, onecycle
  scheduler_params:
    T_max: 10  # For cosine
    step_size: 3  # For step
    gamma: 0.1  # For step/exponential
    factor: 0.5  # For reduce_on_plateau
    patience: 3  # For reduce_on_plateau
  warmup_steps: 0
  
  # Early Stopping
  early_stopping_patience: 5
  early_stopping_min_delta: 0.001
  early_stopping_mode: "min"  # min, max
  
  # Checkpointing
  save_checkpoints: true
  checkpoint_dir: "./checkpoints"
  checkpoint_frequency: 1  # Save every N epochs
  save_best_only: true
  
  # Experiment Tracking
  use_tensorboard: true
  use_wandb: false
  experiment_name: "default_experiment"
  log_dir: "./logs"
  
  # Distributed Training
  use_ddp: false
  ddp_backend: "nccl"  # nccl, gloo
  world_size: 1
  rank: 0
  
  # Fine-tuning (LoRA/P-tuning)
  use_lora: false
  lora_config:
    r: 8
    lora_alpha: 16
    target_modules: ["query", "key", "value", "dense"]
    lora_dropout: 0.1
    bias: "none"
    task_type: "FEATURE_EXTRACTION"
  
  use_p_tuning: false
  p_tuning_config:
    num_virtual_tokens: 10
    encoder_hidden_size: 128
  
  # Debugging
  detect_anomaly: false
  log_interval: 100

# Evaluation Configuration
evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1_score"
    - "auc_roc"
    - "auc_pr"
  compute_confusion_matrix: true
  compute_roc_curve: true
  compute_pr_curve: true
  save_predictions: false
  output_dir: "./evaluation_results"



