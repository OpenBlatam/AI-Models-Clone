version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - COMFYUI_API_URL=http://comfyui:8188
      - OPENROUTER_ENABLED=${OPENROUTER_ENABLED:-true}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TRUTHGPT_ENABLED=${TRUTHGPT_ENABLED:-true}
      - TRUTHGPT_ENDPOINT=${TRUTHGPT_ENDPOINT:-http://truthgpt:8000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
    volumes:
      - ./workflows:/app/workflows
      - ./logs:/app/logs
    depends_on:
      - comfyui
    restart: unless-stopped
    networks:
      - clothing_changer_network

  comfyui:
    image: comfyui/comfyui:latest
    ports:
      - "8188:8188"
    volumes:
      - comfyui_models:/app/models
      - comfyui_output:/app/output
    restart: unless-stopped
    networks:
      - clothing_changer_network

  # Optional: Redis for shared cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - clothing_changer_network
    profiles:
      - cache

volumes:
  comfyui_models:
  comfyui_output:
  redis_data:

networks:
  clothing_changer_network:
    driver: bridge

