# Enhanced Configuration File for HeyGen AI System
# This file contains all system configuration settings

# Database Configuration
database:
  host: "localhost"
  port: 5432
  name: "heygen_ai"
  user: "postgres"
  password: "your_secure_password_here"
  ssl_mode: "prefer"
  max_connections: 100
  connection_timeout: 30
  pool_size: 20
  retry_attempts: 3

# Cache Configuration
cache:
  redis_host: "localhost"
  redis_port: 6379
  redis_password: ""
  redis_db: 0
  memory_cache_size: 1000
  cache_ttl: 3600
  cache_strategy: "lru"
  enable_clustering: false
  cluster_nodes: []

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  timeout: 30
  rate_limit: 1000
  cors_origins: ["*"]
  enable_docs: true
  enable_metrics: true
  api_version: "v1"
  max_request_size: 104857600  # 100MB

# Security Configuration
security:
  secret_key: "your_super_secret_key_here_make_it_at_least_32_characters_long"
  algorithm: "HS256"
  access_token_expire_minutes: 30
  refresh_token_expire_days: 7
  password_min_length: 8
  enable_2fa: true
  max_login_attempts: 5
  lockout_duration: 15
  enable_encryption: true
  encryption_key: ""

# Monitoring Configuration
monitoring:
  log_level: "INFO"
  enable_metrics: true
  metrics_port: 9090
  health_check_interval: 30
  enable_tracing: true
  tracing_endpoint: "http://localhost:14268/api/traces"
  enable_profiling: false
  profiling_interval: 60
  alert_thresholds:
    cpu_usage: 80.0
    memory_usage: 85.0
    disk_usage: 90.0
    response_time: 2.0

# System Configuration
system:
  environment: "development"  # development, staging, production, testing
  debug: false
  log_file: "logs/heygen_ai.log"
  max_log_size: 104857600  # 100MB
  backup_logs: 5
  temp_dir: "temp"
  data_dir: "data"
  enable_backup: true
  backup_interval: 86400  # 24 hours
  max_backup_files: 10

# AI Model Configuration
ai_models:
  default_model: "gpt-4"
  fallback_model: "gpt-3.5-turbo"
  max_tokens: 4096
  temperature: 0.7
  top_p: 0.9
  frequency_penalty: 0.0
  presence_penalty: 0.0
  enable_streaming: true
  request_timeout: 60

# Video Processing Configuration
video_processing:
  max_video_duration: 300  # 5 minutes
  supported_formats: ["mp4", "avi", "mov", "mkv"]
  output_format: "mp4"
  quality_preset: "high"
  enable_hardware_acceleration: true
  max_concurrent_jobs: 4
  temp_storage_path: "temp/video_processing"

# Audio Processing Configuration
audio_processing:
  sample_rate: 44100
  channels: 2
  bit_depth: 16
  supported_formats: ["wav", "mp3", "aac", "ogg"]
  output_format: "wav"
  noise_reduction: true
  audio_enhancement: true

# Storage Configuration
storage:
  local_storage_path: "data/storage"
  enable_cloud_storage: false
  cloud_provider: "aws"  # aws, gcp, azure
  bucket_name: ""
  enable_cdn: false
  cdn_domain: ""
  max_file_size: 1073741824  # 1GB
  retention_policy: "30_days"

# Performance Configuration
performance:
  enable_caching: true
  cache_ttl: 3600
  enable_compression: true
  compression_level: 6
  enable_async_processing: true
  max_worker_threads: 8
  enable_load_balancing: false
  health_check_interval: 30

# Logging Configuration
logging:
  enable_structured_logging: true
  enable_json_logging: true
  enable_file_rotation: true
  max_log_files: 10
  log_format: "json"
  enable_remote_logging: false
  remote_logging_endpoint: ""
  enable_log_aggregation: false

# Error Handling Configuration
error_handling:
  enable_detailed_errors: true
  enable_error_tracking: true
  error_reporting_endpoint: ""
  max_error_log_size: 10485760  # 10MB
  enable_automatic_recovery: true
  retry_attempts: 3
  retry_delay: 5

# Development Configuration
development:
  enable_hot_reload: true
  enable_debug_toolbar: false
  enable_profiling: false
  enable_testing_mode: false
  mock_external_apis: false
  enable_development_logs: true
