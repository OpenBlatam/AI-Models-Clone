# Enhanced SEO System - Example Configuration
# Copy this file to config.yaml and customize for your needs

# Model Configuration
model:
  name: "microsoft/DialoGPT-medium"  # Model to use for analysis
  max_length: 512                     # Maximum text length to process
  batch_size: 8                       # Batch size for processing
  device: "auto"                      # Device: "auto", "cpu", "cuda", "mps"

# Performance Configuration
performance:
  enable_mixed_precision: true        # Enable mixed precision for GPU
  enable_gradient_checkpointing: true # Enable gradient checkpointing
  enable_memory_efficient_attention: true  # Memory-efficient attention
  enable_flash_attention: true        # Flash attention (if available)
  memory_fraction: 0.8                # GPU memory fraction to use
  num_workers: 4                      # Number of worker processes
  pin_memory: true                    # Pin memory for faster GPU transfer

# Caching Configuration
caching:
  enable_caching: true                # Enable result caching
  cache_size: 1000                    # Maximum cache entries
  cache_ttl: 3600                     # Cache TTL in seconds (1 hour)

# Monitoring Configuration
monitoring:
  enable_profiling: true              # Enable performance profiling
  enable_metrics: true                # Enable metrics collection
  enable_logging: true                # Enable logging
  log_level: "INFO"                   # Log level: DEBUG, INFO, WARNING, ERROR

# Async Configuration
async:
  enable_async: true                  # Enable async processing
  max_concurrent_requests: 10         # Maximum concurrent requests
  request_timeout: 30                 # Request timeout in seconds

# Error Handling
error_handling:
  max_retries: 3                      # Maximum retry attempts
  retry_delay: 1.0                    # Delay between retries in seconds
  enable_circuit_breaker: true        # Enable circuit breaker pattern

# Optimization
optimization:
  enable_model_compilation: true      # Enable PyTorch model compilation
  enable_dynamic_shapes: true         # Enable dynamic shape optimization
  enable_optimized_attention: true    # Enable optimized attention mechanisms

# Server Configuration
server:
  host: "0.0.0.0"                    # Host to bind to
  port: 7860                          # Port to bind to
  share: false                        # Create public link
  debug: false                        # Enable debug mode

# Development Settings
development:
  auto_reload: true                   # Auto-reload on code changes
  show_error: true                    # Show detailed error messages
  quiet: false                        # Suppress output

# Production Settings
production:
  workers: 4                          # Number of worker processes
  max_requests: 1000                  # Maximum requests per worker
  timeout: 30                         # Request timeout
  keep_alive: 2                      # Keep-alive timeout

# Custom SEO Rules
seo_rules:
  min_word_count: 300                 # Minimum words for good SEO
  max_sentence_length: 20             # Maximum sentence length
  min_sentences: 5                    # Minimum sentences
  min_keywords: 5                     # Minimum unique keywords
  min_content_length: 1500            # Minimum content length

# Keyword Analysis
keyword_analysis:
  min_word_length: 3                  # Minimum word length to consider
  max_keywords: 10                    # Maximum keywords to extract
  exclude_common_words: true          # Exclude common stop words
  language: "en"                      # Language for analysis

# Content Quality
content_quality:
  readability_threshold: 0.7          # Readability score threshold
  keyword_density_range: [1.0, 3.0]  # Optimal keyword density range
  sentence_variety_threshold: 0.6     # Sentence variety threshold
  paragraph_structure: true           # Check paragraph structure

# Export Settings
export:
  format: "json"                      # Export format: json, csv, xml
  include_metadata: true              # Include processing metadata
  include_timestamps: true            # Include timestamps
  compression: false                  # Enable compression

# Integration Settings
integrations:
  webhook_url: ""                     # Webhook URL for notifications
  api_key: ""                         # API key for external services
  rate_limit: 100                     # Rate limit per minute
  timeout: 30                         # Integration timeout

# Security Settings
security:
  input_validation: true              # Enable input validation
  sanitize_output: true               # Sanitize output data
  max_file_size: 10485760            # Maximum file size (10MB)
  allowed_extensions: [".txt", ".md", ".html"]  # Allowed file extensions

# Backup and Recovery
backup:
  enable_backup: true                 # Enable automatic backups
  backup_interval: 3600               # Backup interval in seconds
  max_backups: 10                    # Maximum backup files to keep
  backup_directory: "./backups"       # Backup directory

# Notifications
notifications:
  email_enabled: false                # Enable email notifications
  email_smtp_server: ""               # SMTP server
  email_username: ""                  # Email username
  email_password: ""                  # Email password
  email_recipients: []                # Email recipients
  slack_webhook: ""                   # Slack webhook URL
  discord_webhook: ""                 # Discord webhook URL

# Advanced Settings
advanced:
  enable_experimental_features: false # Enable experimental features
  custom_models_path: ""              # Path to custom models
  model_cache_directory: "./models"   # Model cache directory
  temp_directory: "./temp"            # Temporary directory
  cleanup_interval: 3600              # Cleanup interval in seconds
