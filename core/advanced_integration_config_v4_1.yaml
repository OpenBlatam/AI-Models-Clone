# Configuración del Sistema de Integración y Optimización Avanzada v4.1
# HeyGen AI - Sistema de Monitoreo Inteligente con IA Avanzada

# Configuración del Dashboard Web
dashboard:
  host: "localhost"
  port: 8080
  enable_websockets: true
  refresh_interval: 5  # segundos
  theme: "modern"
  features:
    real_time_updates: true
    interactive_charts: true
    mobile_responsive: true
    dark_mode: true
  
  # Configuración de seguridad
  security:
    enable_authentication: false
    allowed_origins: ["*"]
    rate_limiting: true
    max_connections: 100

# Configuración del Motor de Alertas Inteligentes
alerting:
  enable_predictive_alerts: true
  confidence_threshold: 0.7
  escalation_enabled: true
  
  # Reglas de alertas inteligentes
  alert_rules:
    cpu_threshold:
      warning: 70
      critical: 90
      prediction_window: 300  # segundos
      
    memory_threshold:
      warning: 80
      critical: 95
      prediction_window: 180
      
    response_time_threshold:
      warning: 2.0  # segundos
      critical: 5.0
      prediction_window: 120
      
    gpu_threshold:
      warning: 85
      critical: 98
      prediction_window: 240
      
    error_rate_threshold:
      warning: 5.0  # porcentaje
      critical: 15.0
      prediction_window: 60
  
  # Políticas de escalación
  escalation_policies:
    critical:
      immediate_actions: ["page_oncall", "restart_service", "scale_resources"]
      escalation_delay: 0
      max_escalations: 3
      
    high:
      immediate_actions: ["notify_team", "scale_resources"]
      escalation_delay: 300
      max_escalations: 2
      
    medium:
      immediate_actions: ["log_alert", "notify_team"]
      escalation_delay: 600
      max_escalations: 1
      
    low:
      immediate_actions: ["log_alert"]
      escalation_delay: 1800
      max_escalations: 0

# Configuración de Optimización Automática
optimization:
  auto_optimize: true
  optimization_interval: 300  # segundos
  risk_threshold: "medium"
  
  # Reglas de optimización
  optimization_rules:
    cpu_optimization:
      trigger_threshold: 80
      actions:
        - name: "scale_cpu_workers"
          priority: 1
          expected_improvement: {"cpu_usage": -20}
          risk_level: "low"
          
        - name: "optimize_batch_size"
          priority: 2
          expected_improvement: {"cpu_usage": -10, "throughput": 15}
          risk_level: "low"
          
    memory_optimization:
      trigger_threshold: 85
      actions:
        - name: "cleanup_memory"
          priority: 1
          expected_improvement: {"memory_usage": -25}
          risk_level: "low"
          
        - name: "restart_memory_intensive_services"
          priority: 2
          expected_improvement: {"memory_usage": -40}
          risk_level: "medium"
          
    gpu_optimization:
      trigger_threshold: 90
      actions:
        - name: "balance_gpu_load"
          priority: 1
          expected_improvement: {"gpu_usage": -15}
          risk_level: "low"
          
        - name: "scale_gpu_workers"
          priority: 2
          expected_improvement: {"gpu_usage": -30}
          risk_level: "medium"
          
    response_time_optimization:
      trigger_threshold: 3.0
      actions:
        - name: "optimize_database_queries"
          priority: 1
          expected_improvement: {"response_time": -40}
          risk_level: "low"
          
        - name: "enable_caching"
          priority: 2
          expected_improvement: {"response_time": -60}
          risk_level: "low"

# Configuración de Monitoreo del Sistema
monitoring:
  interval: 30  # segundos
  retention_period: 86400  # 24 horas
  enable_historical_analysis: true
  
  # Métricas del sistema
  system_metrics:
    cpu: true
    memory: true
    disk: true
    network: true
    processes: true
    
  # Métricas específicas de HeyGen AI
  heygen_ai_metrics:
    model_performance: true
    inference_time: true
    accuracy: true
    throughput: true
    error_rate: true
    gpu_utilization: true
    memory_usage: true
    
  # Análisis de patrones
  pattern_analysis:
    enable_trend_detection: true
    enable_seasonality_detection: true
    enable_anomaly_detection: true
    min_data_points: 100
    confidence_threshold: 0.8

# Configuración de Predicciones y ML
predictions:
  enable_resource_prediction: true
  prediction_horizon: 3600  # 1 hora
  update_frequency: 300  # 5 minutos
  
  # Modelos de predicción
  models:
    cpu_prediction:
      algorithm: "lstm"
      features: ["cpu_usage", "memory_usage", "network_io", "time_of_day"]
      training_window: 604800  # 1 semana
      
    memory_prediction:
      algorithm: "linear_regression"
      features: ["memory_usage", "cpu_usage", "active_processes"]
      training_window: 2592000  # 1 mes
      
    gpu_prediction:
      algorithm: "random_forest"
      features: ["gpu_usage", "memory_usage", "batch_size", "model_type"]
      training_window: 604800  # 1 semana

# Configuración de Integración Externa
integration:
  # APIs externas
  external_apis:
    slack:
      enabled: true
      webhook_url: "${SLACK_WEBHOOK_URL}"
      channels: ["#alerts", "#monitoring"]
      
    email:
      enabled: true
      smtp_server: "${SMTP_SERVER}"
      smtp_port: 587
      username: "${SMTP_USERNAME}"
      password: "${SMTP_PASSWORD}"
      recipients: ["admin@heygen.ai", "ops@heygen.ai"]
      
    webhook:
      enabled: true
      endpoints: ["${WEBHOOK_URL}"]
      
  # Bases de datos
  databases:
    metrics_db:
      type: "influxdb"
      url: "${INFLUXDB_URL}"
      database: "heygen_metrics"
      retention_policy: "30d"
      
    alerts_db:
      type: "postgresql"
      url: "${POSTGRES_URL}"
      database: "heygen_alerts"
      
  # Sistemas de monitoreo
  monitoring_systems:
    prometheus:
      enabled: true
      endpoint: "${PROMETHEUS_ENDPOINT}"
      
    grafana:
      enabled: true
      endpoint: "${GRAFANA_ENDPOINT}"

# Configuración de Seguridad y Auditoría
security:
  enable_audit_logging: true
  log_sensitive_operations: true
  encryption_enabled: true
  
  # Autenticación y autorización
  authentication:
    type: "jwt"
    secret_key: "${JWT_SECRET}"
    token_expiry: 3600
    
  # Control de acceso
  access_control:
    admin_users: ["admin@heygen.ai"]
    read_only_users: ["viewer@heygen.ai"]
    api_rate_limit: 1000  # requests per hour

# Configuración de Rendimiento
performance:
  # Configuración de caché
  cache:
    enable_redis: true
    redis_url: "${REDIS_URL}"
    cache_ttl: 300  # segundos
    
  # Configuración de workers
  workers:
    max_concurrent_workers: 10
    worker_timeout: 300
    enable_auto_scaling: true
    
  # Configuración de base de datos
  database:
    connection_pool_size: 20
    query_timeout: 30
    enable_connection_pooling: true

# Configuración de Logging
logging:
  level: "INFO"
  format: "json"
  output: "file"
  log_file: "logs/advanced_integration_v4_1.log"
  max_file_size: "100MB"
  backup_count: 5
  
  # Logging específico por componente
  components:
    dashboard: "INFO"
    alerting: "DEBUG"
    optimization: "INFO"
    monitoring: "INFO"
    predictions: "DEBUG"

# Configuración de Testing y Desarrollo
development:
  enable_debug_mode: false
  enable_profiling: false
  enable_mock_data: false
  
  # Configuración de testing
  testing:
    enable_integration_tests: true
    enable_unit_tests: true
    test_timeout: 30
    
  # Configuración de desarrollo
  development:
    hot_reload: false
    verbose_logging: false
    enable_metrics_mock: false

# Configuración de Despliegue
deployment:
  environment: "production"
  version: "4.1.0"
  
  # Configuración de Docker
  docker:
    image_name: "heygen-ai-monitor-v4-1"
    container_name: "heygen-monitor"
    port_mapping: "8080:8080"
    
  # Configuración de Kubernetes
  kubernetes:
    namespace: "monitoring"
    replicas: 3
    resource_limits:
      cpu: "1000m"
      memory: "2Gi"
    resource_requests:
      cpu: "500m"
      memory: "1Gi"
      
  # Configuración de escalado
  scaling:
    min_replicas: 1
    max_replicas: 10
    target_cpu_utilization: 70
    target_memory_utilization: 80

# Configuración de Backup y Recuperación
backup:
  enable_automatic_backup: true
  backup_interval: 86400  # 24 horas
  retention_period: 2592000  # 30 días
  
  # Configuración de backup
  backup_config:
    metrics_data: true
    configuration: true
    logs: true
    models: true
    
  # Configuración de recuperación
  recovery:
    enable_auto_recovery: true
    max_recovery_attempts: 3
    recovery_timeout: 300

# Configuración de Notificaciones
notifications:
  # Canales de notificación
  channels:
    slack:
      enabled: true
      priority_levels: ["critical", "high", "medium"]
      
    email:
      enabled: true
      priority_levels: ["critical", "high"]
      
    sms:
      enabled: false
      priority_levels: ["critical"]
      
    webhook:
      enabled: true
      priority_levels: ["critical", "high", "medium", "low"]
      
  # Plantillas de notificación
  templates:
    critical_alert:
      subject: "🚨 ALERTA CRÍTICA - HeyGen AI Monitor"
      body: "Se ha detectado una alerta crítica en el sistema: {alert_message}"
      
    optimization_detected:
      subject: "🔧 Optimización Detectada - HeyGen AI Monitor"
      body: "Se ha identificado una oportunidad de optimización: {optimization_details}"
      
    system_status:
      subject: "📊 Estado del Sistema - HeyGen AI Monitor"
      body: "Resumen del estado del sistema: {system_summary}"

# Configuración de Métricas Personalizadas
custom_metrics:
  # Métricas específicas de HeyGen AI
  heygen_specific:
    video_generation_time: true
    audio_processing_time: true
    model_accuracy: true
    user_satisfaction: true
    
  # Métricas de negocio
  business_metrics:
    requests_per_minute: true
    success_rate: true
    average_response_time: true
    cost_per_request: true
    
  # Métricas de infraestructura
  infrastructure_metrics:
    server_uptime: true
    network_latency: true
    storage_usage: true
    backup_status: true
