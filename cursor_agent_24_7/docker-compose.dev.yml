# Docker Compose - Desarrollo
# ============================
# Configuración para desarrollo local

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: cursor-agent-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - cursor-agent-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder  # Usar stage de builder para desarrollo
    container_name: cursor-agent-api-dev
    ports:
      - "8024:8024"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8024
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET_KEY=dev-secret-key
      - OTEL_LOG_EXPORTER=true
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    command: uvicorn main:app --host 0.0.0.0 --port 8024 --reload
    depends_on:
      - redis
    networks:
      - cursor-agent-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cursor-agent-worker-dev
    command: celery -A core.celery_worker.celery_app worker --loglevel=debug --concurrency=2
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - redis
    networks:
      - cursor-agent-network

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cursor-agent-flower-dev
    command: celery -A core.celery_worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - worker
    networks:
      - cursor-agent-network

volumes:
  redis-data:

networks:
  cursor-agent-network:
    driver: bridge




