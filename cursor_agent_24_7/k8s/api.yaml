apiVersion: apps/v1
kind: Deployment
metadata:
  name: cursor-agent-api
  namespace: cursor-agent
  labels:
    app: cursor-agent-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cursor-agent-api
  template:
    metadata:
      labels:
        app: cursor-agent-api
    spec:
      containers:
      - name: api
        image: cursor-agent-24-7:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8024
          name: http
        envFrom:
        - configMapRef:
            name: cursor-agent-config
        - secretRef:
            name: cursor-agent-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8024
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8024
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: data
        emptyDir: {}
      - name: logs
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - cursor-agent-api
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: cursor-agent-api
  namespace: cursor-agent
spec:
  selector:
    app: cursor-agent-api
  ports:
  - port: 80
    targetPort: 8024
    protocol: TCP
    name: http
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cursor-agent-api-hpa
  namespace: cursor-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cursor-agent-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max




