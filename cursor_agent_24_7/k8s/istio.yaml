# Istio Service Mesh Configuration
# =================================

apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: cursor-agent-api
  namespace: cursor-agent
spec:
  hosts:
  - cursor-agent-api
  - api.cursor-agent.example.com
  http:
  - match:
    - uri:
        prefix: "/api"
    route:
    - destination:
        host: cursor-agent-api
        subset: v1
      weight: 100
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
    fault:
      delay:
        percentage:
          value: 0.1
        fixedDelay: 5s
  - match:
    - uri:
        prefix: "/metrics"
    route:
    - destination:
        host: cursor-agent-api
    timeout: 10s
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: cursor-agent-api
  namespace: cursor-agent
spec:
  host: cursor-agent-api
  subsets:
  - name: v1
    labels:
      version: v1
  trafficPolicy:
    loadBalancer:
      simple: LEAST_CONN
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 10
        http2MaxRequests: 100
        maxRequestsPerConnection: 2
    circuitBreaker:
      consecutiveErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 50
    outlierDetection:
      consecutiveErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: cursor-agent
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: cursor-agent-api-policy
  namespace: cursor-agent
spec:
  selector:
    matchLabels:
      app: cursor-agent-api
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/cursor-agent/sa/cursor-agent-api"]
    to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE"]
        paths: ["/api/*"]
---
apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: cursor-agent-gateway
  namespace: cursor-agent
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - api.cursor-agent.example.com
    tls:
      httpsRedirect: true
  - port:
      number: 443
      name: https
      protocol: HTTPS
    hosts:
    - api.cursor-agent.example.com
    tls:
      mode: SIMPLE
      credentialName: cursor-agent-tls




