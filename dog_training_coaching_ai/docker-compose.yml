version: '3.8'

services:
  dog-training-ai:
    build: .
    ports:
      - "8030:8030"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-4o}
      - DOG_TRAINING_AI_PORT=8030
    volumes:
      - .:/app
    restart: unless-stopped

