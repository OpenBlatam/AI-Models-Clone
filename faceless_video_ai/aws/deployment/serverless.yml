service: faceless-video-ai

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  memorySize: 1024
  timeout: 300
  environment:
    ENVIRONMENT: ${self:provider.stage}
    AWS_REGION: ${self:provider.region}
    LOG_LEVEL: INFO
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource:
            - arn:aws:s3:::${self:custom.bucketName}/*
            - arn:aws:s3:::${self:custom.bucketName}
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
            - secretsmanager:DescribeSecret
          Resource:
            - arn:aws:secretsmanager:${self:provider.region}:*:secret:faceless-video-ai/*
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: '*'

custom:
  bucketName: faceless-video-ai-${self:provider.stage}-${aws:accountId}
  apiGateway:
    restApiId:
      Ref: ApiGatewayRestApi
    restApiRootResourceId:
      Fn::GetAtt:
        - ApiGatewayRestApi
        - RootResourceId

functions:
  api:
    handler: lambda-handler.lambda_handler
    description: Faceless Video AI API
    events:
      - http:
          path: /{proxy+}
          method: ANY
          cors: true
      - http:
          path: /
          method: ANY
          cors: true
    environment:
      OPENAI_API_KEY: ${ssm:/faceless-video-ai/${self:provider.stage}/openai-api-key}
      STABILITY_AI_API_KEY: ${ssm:/faceless-video-ai/${self:provider.stage}/stability-api-key}
      ELEVENLABS_API_KEY: ${ssm:/faceless-video-ai/${self:provider.stage}/elevenlabs-api-key}
    layers:
      - arn:aws:lambda:${self:provider.region}:${aws:accountId}:layer:faceless-video-deps:1

resources:
  Resources:
    # S3 Bucket
    VideoStorageBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.bucketName}
        VersioningConfiguration:
          Status: Enabled
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

    # API Gateway
    ApiGatewayRestApi:
      Type: AWS::ApiGateway::RestApi
      Properties:
        Name: faceless-video-ai-${self:provider.stage}
        Description: Faceless Video AI API
        EndpointConfiguration:
          Types:
            - REGIONAL

  Outputs:
    ApiGatewayRestApiId:
      Value:
        Ref: ApiGatewayRestApi
      Export:
        Name: ${self:provider.stage}-ApiGatewayRestApiId

    ApiGatewayRestApiRootResourceId:
      Value:
        Fn::GetAtt:
          - ApiGatewayRestApi
          - RootResourceId
      Export:
        Name: ${self:provider.stage}-ApiGatewayRestApiRootResourceId

    VideoStorageBucketName:
      Value:
        Ref: VideoStorageBucket
      Export:
        Name: ${self:provider.stage}-VideoStorageBucketName

plugins:
  - serverless-python-requirements
  - serverless-offline

package:
  patterns:
    - '!node_modules/**'
    - '!tests/**'
    - '!*.md'
    - '!*.yaml'
    - '!*.yml'
    - '!.git/**'




