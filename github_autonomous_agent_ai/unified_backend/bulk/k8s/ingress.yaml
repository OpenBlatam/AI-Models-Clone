apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bul-api-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - api.bul.example.com
    secretName: bul-api-tls
  rules:
  - host: api.bul.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bul-api-service
            port:
              number: 80
































