apiVersion: apps/v1
kind: Deployment
metadata:
  name: seo-engine
  namespace: seo-system
  labels:
    app: seo-engine
    version: ultra-quality
spec:
  replicas: 3
  selector:
    matchLabels:
      app: seo-engine
  template:
    metadata:
      labels:
        app: seo-engine
        version: ultra-quality
    spec:
      containers:
      - name: seo-engine
        image: seo-ultra-quality:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: seo-config
              key: LOG_LEVEL
        - name: CACHE_TTL
          valueFrom:
            configMapKeyRef:
              name: seo-config
              key: CACHE_TTL
        - name: BATCH_SIZE
          valueFrom:
            configMapKeyRef:
              name: seo-config
              key: BATCH_SIZE
        - name: MAX_CONCURRENT
          valueFrom:
            configMapKeyRef:
              name: seo-config
              key: MAX_CONCURRENT
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
