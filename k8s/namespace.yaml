apiVersion: v1
kind: Namespace
metadata:
  name: seo-system
  labels:
    name: seo-system
    environment: production
    app: seo-ultra-quality
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: seo-system-quota
  namespace: seo-system
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    requests.ephemeral-storage: 10Gi
    limits.ephemeral-storage: 20Gi
    persistentvolumeclaims: "10"
    services: "20"
    pods: "20"
