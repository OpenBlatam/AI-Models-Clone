apiVersion: v1
kind: Service
metadata:
  name: seo-service
  namespace: seo-system
  labels:
    app: seo-engine
spec:
  selector:
    app: seo-engine
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
    name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: seo-system
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
    name: redis
  type: ClusterIP
