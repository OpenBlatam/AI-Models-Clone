name: Deploy to AWS

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'agents/backend/onyx/server/features/manuales_hogar_ai/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: us-east-1
  APP_NAME: manuales-hogar-ai
  ECR_REPOSITORY: manuales-hogar-ai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd agents/backend/onyx/server/features/manuales_hogar_ai
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Install CDK dependencies
        run: |
          cd agents/backend/onyx/server/features/manuales_hogar_ai/aws/infrastructure
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g aws-cdk

      - name: Bootstrap CDK (if needed)
        run: |
          cd agents/backend/onyx/server/features/manuales_hogar_ai/aws/infrastructure
          cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }} || true

      - name: Deploy CDK stack
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          cd agents/backend/onyx/server/features/manuales_hogar_ai/aws/infrastructure
          cdk deploy --require-approval never \
            --context region=${{ env.AWS_REGION }} \
            --context account=${{ secrets.AWS_ACCOUNT_ID }} \
            --context environment=${{ env.ENVIRONMENT }}

      - name: Update ECS service
        env:
          CLUSTER_NAME: ${{ env.APP_NAME }}-cluster
          SERVICE_NAME: ${{ env.APP_NAME }}-service
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.APP_NAME }}-task-def \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          
          aws ecs update-service \
            --cluster $CLUSTER_NAME \
            --service $SERVICE_NAME \
            --task-definition $TASK_DEF \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.APP_NAME }}-cluster \
            --services ${{ env.APP_NAME }}-service \
            --region ${{ env.AWS_REGION }}

      - name: Get load balancer DNS
        id: get-dns
        run: |
          DNS=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.APP_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].Outputs[?OutputKey==`LoadBalancerDNS`].OutputValue' \
            --output text)
          echo "dns=$DNS" >> $GITHUB_OUTPUT

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ steps.build-image.outputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Load Balancer DNS**: ${{ steps.get-dns.outputs.dns }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Deployment successful" >> $GITHUB_STEP_SUMMARY




