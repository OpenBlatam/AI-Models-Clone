AWSTemplateFormatVersion: '2010-09-09'
Description: 'Music Analyzer AI - AWS Serverless Infrastructure'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]
  
  SpotifyClientId:
    Type: String
    Description: Spotify API Client ID
    NoEcho: true
  
  SpotifyClientSecret:
    Type: String
    Description: Spotify API Client Secret
    NoEcho: true
  
  LambdaMemorySize:
    Type: Number
    Default: 1024
    Description: Lambda function memory size (MB)
  
  LambdaTimeout:
    Type: Number
    Default: 300
    Description: Lambda function timeout (seconds)

Resources:
  # Lambda Function
  MusicAnalyzerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'music-analyzer-ai-${Environment}'
      Runtime: python3.11
      Handler: deployment.aws.lambda_handler.lambda_handler
      Code:
        ZipFile: |
          # Placeholder - actual code will be deployed via CI/CD
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Deploying...'}
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          SPOTIFY_CLIENT_ID: !Ref SpotifyClientId
          SPOTIFY_CLIENT_SECRET: !Ref SpotifyClientSecret
          CACHE_ENABLED: 'true'
          LOG_LEVEL: 'INFO'
          CLOUDWATCH_ENABLED: 'true'
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref LambdaDependenciesLayer
      ReservedConcurrentExecutions: 100
      DeadLetterQueue:
        TargetArn: !GetAtt DeadLetterQueue.Arn

  # Lambda Layer for dependencies
  LambdaDependenciesLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub 'music-analyzer-deps-${Environment}'
      Description: Dependencies for Music Analyzer AI
      Content:
        S3Bucket: !Ref DependenciesBucket
        S3Key: dependencies.zip
      CompatibleRuntimes:
        - python3.11

  # API Gateway
  MusicAnalyzerApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub 'music-analyzer-api-${Environment}'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - '*'
        MaxAge: 3600

  # API Gateway Integration
  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref MusicAnalyzerApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MusicAnalyzerLambda.Arn}/invocations'
      PayloadFormatVersion: '2.0'

  # API Gateway Route
  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref MusicAnalyzerApi
      RouteKey: '$default'
      Target: !Sub 'integrations/${ApiIntegration}'

  # API Gateway Stage
  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref MusicAnalyzerApi
      StageName: !Sub '${Environment}'
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

  # Lambda Permission for API Gateway
  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MusicAnalyzerLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MusicAnalyzerApi}/*/*'

  # IAM Role for Lambda
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'music-analyzer-lambda-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/music-analyzer-ai-${Environment}*'

  # Dead Letter Queue
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'music-analyzer-dlq-${Environment}'
      MessageRetentionPeriod: 1209600  # 14 days

  # CloudWatch Log Group
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/music-analyzer-ai-${Environment}'
      RetentionInDays: 30

  # S3 Bucket for dependencies (placeholder)
  DependenciesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'music-analyzer-deps-${AWS::AccountId}-${Environment}'
      VersioningConfiguration:
        Status: Enabled

  # DynamoDB Table for caching (optional)
  CacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'music-analyzer-cache-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: key
          AttributeType: S
      KeySchema:
        - AttributeName: key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ElastiCache Redis for advanced caching (optional)
  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Subnet group for Redis cache
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  RedisCluster:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupId: !Sub 'music-analyzer-redis-${Environment}'
      Description: Redis cache for Music Analyzer AI
      NumCacheClusters: 2
      Engine: redis
      CacheNodeType: cache.t3.micro
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      SecurityGroupIds:
        - !Ref RedisSecurityGroup

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${MusicAnalyzerApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'
  
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt MusicAnalyzerLambda.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaArn'
  
  CacheTableName:
    Description: DynamoDB cache table name
    Value: !Ref CacheTable
    Export:
      Name: !Sub '${AWS::StackName}-CacheTable'




