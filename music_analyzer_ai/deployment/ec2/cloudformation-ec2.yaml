AWSTemplateFormatVersion: '2010-09-09'
Description: 'Music Analyzer AI - EC2 Instance with Auto Setup'

Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - m5.large
      - m5.xlarge
    Description: EC2 instance type
  
  AMI:
    Type: String
    Default: ''
    Description: AMI ID (leave empty to use latest Amazon Linux 2)
  
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair name for SSH access
  
  SpotifyClientId:
    Type: String
    Description: Spotify API Client ID
    NoEcho: true
  
  SpotifyClientSecret:
    Type: String
    Description: Spotify API Client Secret
    NoEcho: true
  
  AllowedCIDR:
    Type: String
    Default: '0.0.0.0/0'
    Description: CIDR block allowed to access the application

Resources:
  # Security Group
  MusicAnalyzerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: music-analyzer-ai-sg
      GroupDescription: Security group for Music Analyzer AI
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCIDR
          Description: SSH access
        - IpProtocol: tcp
          FromPort: 8010
          ToPort: 8010
          CidrIp: !Ref AllowedCIDR
          Description: Music Analyzer AI API
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedCIDR
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AllowedCIDR
          Description: HTTPS
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: !Ref AllowedCIDR
          Description: Grafana
        - IpProtocol: tcp
          FromPort: 9090
          ToPort: 9090
          CidrIp: !Ref AllowedCIDR
          Description: Prometheus
      Tags:
        - Key: Name
          Value: music-analyzer-ai-sg

  # IAM Role for EC2
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: MusicAnalyzerEC2Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::music-analyzer-deployments/*'
                  - !Sub 'arn:aws:s3:::music-analyzer-deployments'

  # Instance Profile
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: MusicAnalyzerEC2Profile
      Roles:
        - !Ref EC2Role

  # EC2 Instance
  MusicAnalyzerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !If
        - UseProvidedAMI
        - !Ref AMI
        - !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref MusicAnalyzerSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y docker git curl wget unzip
          systemctl start docker
          systemctl enable docker
          usermod -a -G docker ec2-user
          
          # Install Docker Compose
          curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          chmod +x /usr/local/bin/docker-compose
          ln -sf /usr/local/bin/docker-compose /usr/bin/docker-compose
          
          # Create app directory
          mkdir -p /opt/music-analyzer-ai
          cd /opt/music-analyzer-ai
          
          # Create .env file
          cat > .env << 'ENVEOF'
          ENVIRONMENT=production
          SPOTIFY_CLIENT_ID=${SpotifyClientId}
          SPOTIFY_CLIENT_SECRET=${SpotifyClientSecret}
          LOG_LEVEL=INFO
          CACHE_ENABLED=true
          POSTGRES_PASSWORD=changeme
          REDIS_PASSWORD=changeme
          GRAFANA_PASSWORD=admin
          DATABASE_URL=postgresql://music_analyzer:changeme@postgres:5432/music_analyzer_db
          ENVEOF
          
          # Note: Application code should be deployed via:
          # - S3 + user-data script
          # - CodeDeploy
          # - Git clone (if repository is public)
          # - Manual deployment
          
          echo "Setup complete. Deploy application code to /opt/music-analyzer-ai"
      Tags:
        - Key: Name
          Value: music-analyzer-ai
        - Key: Environment
          Value: production

  # Elastic IP (optional)
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref MusicAnalyzerInstance
      Tags:
        - Key: Name
          Value: music-analyzer-ai-eip

Conditions:
  UseProvidedAMI: !Not [!Equals [!Ref AMI, '']]

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref MusicAnalyzerInstance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'
  
  PublicIP:
    Description: Public IP address
    Value: !GetAtt MusicAnalyzerInstance.PublicIp
    Export:
      Name: !Sub '${AWS::StackName}-PublicIP'
  
  ElasticIP:
    Description: Elastic IP address
    Value: !Ref ElasticIP
    Export:
      Name: !Sub '${AWS::StackName}-ElasticIP'
  
  ApplicationURL:
    Description: Application URL
    Value: !Sub 'http://${MusicAnalyzerInstance.PublicIp}:8010'
    Export:
      Name: !Sub '${AWS::StackName}-ApplicationURL'
  
  SSHCommand:
    Description: SSH command to connect
    Value: !Sub 'ssh -i your-key.pem ec2-user@${MusicAnalyzerInstance.PublicIp}'
  
  DeployCommand:
    Description: Command to deploy application
    Value: !Sub 'scp -r -i your-key.pem /path/to/app ec2-user@${MusicAnalyzerInstance.PublicIp}:/opt/music-analyzer-ai'




