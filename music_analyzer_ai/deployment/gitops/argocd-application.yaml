apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: music-analyzer-ai
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/blatam-academy/blatam-academy
    targetRevision: main
    path: agents/backend/onyx/server/features/music_analyzer_ai/deployment/kubernetes/helm-chart
    helm:
      valueFiles:
        - values.yaml
        - values-production.yaml
      parameters:
        - name: backend.image.tag
          value: "{{.Values.imageTag}}"
        - name: frontend.image.tag
          value: "{{.Values.imageTag}}"
  
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 10
  
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas




