apiVersion: v2
name: music-analyzer-ai
description: Music Analyzer AI - Helm Chart for Kubernetes
type: application
version: 1.0.0
appVersion: "2.21.0"
keywords:
  - music
  - ai
  - analyzer
  - fastapi
  - nextjs
