apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "music-analyzer-ai.fullname" . }}-network-policy
  labels:
    {{- include "music-analyzer-ai.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "music-analyzer-ai.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    # Allow ingress from frontend
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: frontend
      ports:
        - protocol: TCP
          port: 8000
    # Allow ingress from monitoring
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Allow HTTPS (for external APIs)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Allow HTTP (for external APIs)
    - to: []
      ports:
        - protocol: TCP
          port: 80
    # Allow database access
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # Allow Redis access
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379




