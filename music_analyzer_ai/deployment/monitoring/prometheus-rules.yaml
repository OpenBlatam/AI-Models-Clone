apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: music-analyzer-ai-alerts
  labels:
    app: music-analyzer-ai
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: music-analyzer-ai.rules
      interval: 30s
      rules:
        # High error rate
        - alert: HighErrorRate
          expr: |
            rate(http_requests_total{status=~"5.."}[5m]) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.endpoint }}"
        
        # High response time
        - alert: HighResponseTime
          expr: |
            histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High response time detected"
            description: "95th percentile response time is {{ $value }}s for {{ $labels.endpoint }}"
        
        # Pod down
        - alert: PodDown
          expr: |
            up{job="music-analyzer-ai-backend"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod is down"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is down"
        
        # High CPU usage
        - alert: HighCPUUsage
          expr: |
            rate(container_cpu_usage_seconds_total[5m]) * 100 > 80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage"
            description: "CPU usage is {{ $value }}% for pod {{ $labels.pod }}"
        
        # High memory usage
        - alert: HighMemoryUsage
          expr: |
            container_memory_usage_bytes / container_spec_memory_limit_bytes * 100 > 80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage"
            description: "Memory usage is {{ $value }}% for pod {{ $labels.pod }}"
        
        # Disk space low
        - alert: DiskSpaceLow
          expr: |
            (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 20
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Disk space is low"
            description: "Disk space is {{ $value }}% available on {{ $labels.instance }}"
        
        # Request rate spike
        - alert: RequestRateSpike
          expr: |
            rate(http_requests_total[5m]) > 1000
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Request rate spike detected"
            description: "Request rate is {{ $value }} req/s for {{ $labels.endpoint }}"
        
        # Database connection pool exhausted
        - alert: DatabaseConnectionPoolExhausted
          expr: |
            db_connection_pool_active / db_connection_pool_max > 0.9
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Database connection pool nearly exhausted"
            description: "{{ $value | humanizePercentage }} of connection pool is in use"




