global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'music-analyzer-ai'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules
rule_files:
  # - "alert_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Music Analyzer AI application
  - job_name: 'music-analyzer-ai'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['music-analyzer-ai:8010']
        labels:
          service: 'music-analyzer-ai'
          environment: 'production'

  # Redis exporter (if using redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'

  # PostgreSQL exporter (if using postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          service: 'postgres'




