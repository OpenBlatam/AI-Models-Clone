[build]
  command = "mise settings add idiomatic_version_file_enable_tools node && npm install && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20.11.1"
  MISE_SETTINGS = "idiomatic_version_file_enable_tools=node"
  NEXT_TELEMETRY_DISABLED = "1"
  NPM_FLAGS = "--legacy-peer-deps"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200 