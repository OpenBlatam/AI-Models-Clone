[pytest]
# Pytest configuration for PDF Variantes tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may require external services)
    slow: Slow tests (may take more than 30 seconds)
    performance: Performance tests
    edge_case: Edge case and boundary condition tests
    ai: Tests that require AI services
    blockchain: Tests that require blockchain services
    api: API endpoint tests
    services: Service layer tests
    generator: Variant generator tests
    utils: Utility function tests
    exceptions: Exception handling tests
    models: Model validation tests
    schemas: Schema validation tests
    dependencies: Dependency injection tests
    processor: PDF processing tests
    analytics: Analytics tests
    security: Security tests
    topics: Topic extraction tests
    cache: Cache management tests
    config: Configuration tests
    middleware: Middleware tests
    e2e: End-to-end tests
    scenario: Real-world scenario tests
    playwright: Playwright browser automation tests
    load: Load testing
    stress: Stress testing
    security: Security testing
    comprehensive: Comprehensive tests
    workflow: Workflow tests
    regression: Regression tests
    integration: Integration tests
    parallel: Parallel execution tests
    quality: Quality assurance tests
    monitoring: Monitoring and observability tests
    compliance: Compliance and standards tests
    chaos: Chaos engineering tests
    visual: Visual regression tests
    accessibility: Accessibility tests
    contract: API contract tests
    smoke: Smoke tests (quick verification)
    ci: CI/CD optimized tests
    benchmark: Performance benchmark tests
    exploratory: Exploratory tests
    fast: Fast tests
    critical: Critical path tests
    refactored: Refactored tests using base classes
    pom: Page Object Model tests
    debug: Debugging and troubleshooting tests

# Coverage options (if pytest-cov is installed)
[coverage:run]
source = .
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */migrations/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Logging
log_cli = false
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Asyncio
asyncio_mode = auto

