version: '3.8'

services:
  piel-mejorador-api:
    build: .
    container_name: piel-mejorador-ai-sam3
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TRUTHGPT_ENDPOINT=${TRUTHGPT_ENDPOINT:-}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./piel_mejorador_output:/app/piel_mejorador_output
      - ./cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - piel-mejorador-network

networks:
  piel-mejorador-network:
    driver: bridge




