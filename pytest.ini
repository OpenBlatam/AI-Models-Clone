[pytest]
addopts = -q -n auto --maxfail=1 --disable-warnings --durations=10 -m "not integration" --cov=agents/backend/onyx/server/features/instagram_captions --cov-report=term-missing
testpaths = agents/backend/onyx/server/features/instagram_captions/tests
markers =
    integration: marks tests as integration (deselect with '-m "not integration"')

