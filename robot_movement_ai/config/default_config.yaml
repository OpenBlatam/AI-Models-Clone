# Default Configuration for Routing AI
# ====================================

model:
  model_type: "mlp"  # mlp, gcn, gat, transformer
  input_dim: 20
  hidden_dims: [128, 256, 128]
  output_dim: 4
  dropout: 0.2
  activation: "relu"
  use_batch_norm: true
  use_layer_norm: false
  use_attention: true
  device: null  # null = auto-detect

training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.00001
  optimizer: "adamw"  # adam, adamw, sgd
  scheduler: "reduce_on_plateau"  # reduce_on_plateau, cosine, step, null
  use_mixed_precision: true
  gradient_clip_norm: 1.0
  early_stopping_patience: 20
  early_stopping_min_delta: 0.0
  save_best_model: true
  checkpoint_dir: "./checkpoints"
  log_interval: 10

data:
  data_dir: "./data"
  train_ratio: 0.8
  val_ratio: 0.1
  batch_size: 32
  num_workers: 0
  pin_memory: true
  preprocessing:
    scaler_type: "standard"  # standard, minmax, robust
    normalize_features: true
    normalize_targets: true

experiment:
  project_name: "routing_ai"
  experiment_name: null  # null = auto-generate
  use_wandb: true
  use_tensorboard: true
  log_dir: "./logs"


