# Docker Compose para Robot Movement AI v2.0
# Configuración completa para desarrollo y producción

version: '3.8'

services:
  # Servicio principal de la aplicación
  robot-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robot-movement-ai
    ports:
      - "${API_PORT:-8010}:8010"
    environment:
      - ROBOT_IP=${ROBOT_IP:-192.168.1.100}
      - ROBOT_PORT=${ROBOT_PORT:-30001}
      - ROBOT_BRAND=${ROBOT_BRAND:-kuka}
      - ROS_ENABLED=${ROS_ENABLED:-false}
      - FEEDBACK_FREQUENCY=${FEEDBACK_FREQUENCY:-1000}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./db/robots.db}
      - REPOSITORY_TYPE=${REPOSITORY_TYPE:-in_memory}
      - CACHE_TTL=${CACHE_TTL:-300}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./db:/app/db
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - robot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Base de datos PostgreSQL para producción
  postgres:
    image: postgres:15-alpine
    container_name: robot-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-robots}
      - POSTGRES_USER=${POSTGRES_USER:-robotuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-robotpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - robot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-robotuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para cache
  redis:
    image: redis:7-alpine
    container_name: robot-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - robot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # Prometheus para métricas (opcional)
  prometheus:
    image: prom/prometheus:latest
    container_name: robot-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - robot-network
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana para visualización (opcional)
  grafana:
    image: grafana/grafana:latest
    container_name: robot-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - robot-network
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  robot-network:
    driver: bridge




