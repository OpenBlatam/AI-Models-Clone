apiVersion: apps/v1
kind: Deployment
metadata:
  name: robot-movement-ai
  labels:
    app: robot-movement-ai
    version: "2.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: robot-movement-ai
  template:
    metadata:
      labels:
        app: robot-movement-ai
    spec:
      containers:
      - name: robot-api
        image: robot-movement-ai:latest
        ports:
        - containerPort: 8010
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: robot-secrets
              key: database-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: robot-secrets
              key: secret-key
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8010
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8010
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: robot-movement-ai-service
spec:
  selector:
    app: robot-movement-ai
  ports:
  - port: 80
    targetPort: 8010
    protocol: TCP
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: robot-movement-ai-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: robot-movement-ai
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80




