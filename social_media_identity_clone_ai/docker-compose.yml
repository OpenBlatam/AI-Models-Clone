version: '3.8'

services:
  api:
    build: .
    ports:
      - "8030:8030"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TIKTOK_API_KEY=${TIKTOK_API_KEY}
      - INSTAGRAM_API_KEY=${INSTAGRAM_API_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./social_media_identity_clone.db}
      - STORAGE_PATH=${STORAGE_PATH:-./storage}
      - API_HOST=0.0.0.0
      - API_PORT=8030
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:




