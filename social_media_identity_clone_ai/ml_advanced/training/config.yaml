# Configuración de entrenamiento
# Hyperparameters y settings para modelos

training:
  num_epochs: 10
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 5e-5
  weight_decay: 0.01
  warmup_steps: 100
  max_grad_norm: 1.0
  
  # Optimizador
  optimizer: "adamw"
  optimizer_params:
    betas: [0.9, 0.999]
    eps: 1e-8
  
  # Scheduler
  scheduler: "cosine"
  scheduler_params:
    T_max: 1000
    eta_min: 1e-7
  
  # Early stopping
  early_stopping:
    enabled: true
    patience: 5
    min_delta: 0.001
  
  # Mixed precision
  mixed_precision: true
  
  # Checkpointing
  checkpoint:
    save_dir: "./models/checkpoints"
    save_every_n_epochs: 1
    save_best: true
    max_checkpoints: 5

model:
  # Modelo base
  base_model: "gpt2"
  
  # LoRA config
  lora:
    r: 8
    lora_alpha: 16
    target_modules: ["c_attn", "c_proj"]
    lora_dropout: 0.1
    bias: "none"
  
  # Custom model config
  custom_model:
    enabled: false
    d_model: 768
    nhead: 12
    num_layers: 6
    dim_feedforward: 3072
    dropout: 0.1

data:
  max_length: 512
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  num_workers: 4
  pin_memory: true

experiment:
  tracker: "wandb"  # "wandb" or "tensorboard"
  project_name: "social-media-identity-clone"
  experiment_name: null  # null = auto-generate
  log_every_n_steps: 10

device:
  use_cuda: true
  cuda_device: 0
  multi_gpu: false

logging:
  level: "INFO"
  log_dir: "./logs"




