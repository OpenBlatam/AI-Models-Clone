version: '3.8'

services:
  suno-clone-ai:
    image: suno-clone-ai:latest
    container_name: suno-clone-ai
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8020}:8020"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - suno-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: suno-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - suno-network
    profiles:
      - with-redis

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: suno-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - suno-clone-ai
    networks:
      - suno-network
    profiles:
      - with-nginx

networks:
  suno-network:
    driver: bridge

volumes:
  redis-data:




