[pytest]
# Pytest configuration for ADS System Enhanced Tests

# Test discovery
testpaths = .
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 6.0

# Add custom markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components  
    performance: Performance and benchmark tests
    stress: Stress tests for system robustness
    security: Security and validation tests
    api: API endpoint tests
    concurrency: Concurrency and threading tests
    regression: Regression tests
    snapshot: Snapshot tests
    slow: Slow running tests (>5 seconds)
    fast: Fast running tests (<1 second)
    smoke: Smoke tests for basic functionality
    critical: Critical tests that must pass
    
# Test output options
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --showlocals
    --durations=10
    --durations-min=1.0
    -ra
    --cov-report=term-missing
    --cov-report=html:tests/htmlcov
    --cov-branch
    --cov-fail-under=80

# Coverage configuration
[coverage:run]
source = domain, optimization, training, api, application, infrastructure
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */migrations/*
    */venv/*
    */env/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

# Test collection
collect_ignore = [
    "setup.py",
    "conftest.py",
    "fixtures/",
    "__pycache__/",
    ".pytest_cache/"

# Async settings
asyncio_mode = auto

# Timeout settings (in seconds)
timeout = 300
timeout_method = thread

# Warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    error::pytest.PytestUnraisableExceptionWarning

# Log settings
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Disable warnings
disable_warnings = true

